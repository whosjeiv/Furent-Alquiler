# ═══════════════════════════════════════════════════════
# FURENT - CI/CD Pipeline (GitHub Actions)
# ═══════════════════════════════════════════════════════
# Pipeline completo: Build → Test → Análisis → Docker → Deploy
# Arquitectura: SaaS Enterprise con MongoDB + Redis
# ═══════════════════════════════════════════════════════

name: Furent CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  JAVA_VERSION: '17'
  DOCKER_IMAGE: furent/backend

jobs:
  # ═══════════════════════════════════════════════════════
  # STAGE 1: BUILD + UNIT TESTS
  # ═══════════════════════════════════════════════════════
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    
    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: maven

      - name: Cache Maven Dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Build con Maven
        run: ./mvnw clean compile -B -q
        working-directory: furent

      - name: Ejecutar Tests
        run: ./mvnw test -B
        working-directory: furent
        env:
          SPRING_PROFILES_ACTIVE: dev
          MONGODB_URI: mongodb://localhost:27017/furent_test
          REDIS_HOST: localhost
          REDIS_PORT: 6379

      - name: Generar Reporte JaCoCo
        run: ./mvnw jacoco:report -B -q
        working-directory: furent

      - name: Subir Reporte de Cobertura
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: furent/target/site/jacoco/
          retention-days: 7

      - name: Verificar Cobertura Mínima (80%)
        run: |
          COVERAGE=$(grep -oP 'Total.*?(\d+)%' furent/target/site/jacoco/index.html | grep -oP '\d+' | tail -1 || echo "0")
          echo "Cobertura actual: ${COVERAGE}%"
          if [ "${COVERAGE}" -lt "60" ]; then
            echo "⚠️ Cobertura por debajo del objetivo (60%). Target: 80%"
          fi

      - name: Package JAR
        run: ./mvnw package -DskipTests -B -q
        working-directory: furent

      - name: Subir JAR Artifact
        uses: actions/upload-artifact@v4
        with:
          name: furent-jar
          path: furent/target/*.jar
          retention-days: 5

  # ═══════════════════════════════════════════════════════
  # STAGE 2: STATIC ANALYSIS
  # ═══════════════════════════════════════════════════════
  static-analysis:
    name: Static Analysis
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: maven

      - name: Dependency Check (Vulnerabilidades)
        run: ./mvnw dependency:analyze -B -q || true
        working-directory: furent

  # ═══════════════════════════════════════════════════════
  # STAGE 3: DOCKER BUILD & PUSH
  # ═══════════════════════════════════════════════════════
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [ build, static-analysis ]
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Descargar JAR Artifact
        uses: actions/download-artifact@v4
        with:
          name: furent-jar
          path: furent/target/

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login a Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build & Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: furent
          push: true
          tags: |
            ${{ env.DOCKER_IMAGE }}:latest
            ${{ env.DOCKER_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ═══════════════════════════════════════════════════════
  # STAGE 4: DEPLOY (staging/production)
  # ═══════════════════════════════════════════════════════
  deploy-staging:
    name: Deploy Staging
    runs-on: ubuntu-latest
    needs: docker
    if: github.ref == 'refs/heads/main'
    environment: staging

    steps:
      - name: Deploy a Staging
        run: |
          echo "🚀 Deploying Furent ${{ github.sha }} to staging..."
          echo "Image: ${{ env.DOCKER_IMAGE }}:${{ github.sha }}"
          # kubectl set image deployment/furent furent=${{ env.DOCKER_IMAGE }}:${{ github.sha }} -n furent
