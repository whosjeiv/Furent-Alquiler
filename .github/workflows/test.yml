name: Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.runCommand({ ping: 1 })'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Cache Maven Dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Ejecutar tests
        run: mvn clean test -B
        env:
          SPRING_PROFILES_ACTIVE: test
          MONGODB_URI: mongodb://localhost:27017/furent_test
          REDIS_HOST: localhost
          REDIS_PORT: 6379

      - name: Generar reporte de cobertura con JaCoCo
        run: mvn jacoco:report -B

      - name: Subir reporte de cobertura a Codecov (opcional)
        if: success()
        uses: codecov/codecov-action@v4
        with:
          files: ./target/site/jacoco/jacoco.xml
          flags: unittests
          name: codecov-furent
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Subir reporte JaCoCo como artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: target/site/jacoco/
          retention-days: 7

      - name: Resumen de cobertura
        if: always()
        run: |
          if [ -f target/site/jacoco/index.html ]; then
            echo "📊 Reporte de cobertura generado exitosamente"
            echo "Ver artifact 'jacoco-report' para detalles completos"
          else
            echo "⚠️ No se pudo generar el reporte de cobertura"
          fi
