# ═══════════════════════════════════════════════════════
# FURENT - Production Configuration (SaaS Enterprise)
# ═══════════════════════════════════════════════════════

# Thymeleaf
spring.thymeleaf.cache=true

# MongoDB (override with env variable)
spring.mongodb.uri=${MONGODB_URI}

# Redis (production cluster)
spring.data.redis.host=${REDIS_HOST}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.cache.type=redis
spring.cache.redis.time-to-live=600000

# Session Security - stricter in production
server.servlet.session.timeout=15m
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=true
server.servlet.session.cookie.same-site=strict

# Admin password MUST be set via env variable
furent.admin.password=${ADMIN_PASSWORD}

# Stripe (production keys and webhook secret from env)
# furent.stripe.secret-key=${STRIPE_SECRET_KEY}
# furent.stripe.publishable-key=${STRIPE_PUBLISHABLE_KEY}
# furent.stripe.webhook-secret=${STRIPE_WEBHOOK_SECRET}
# furent.stripe.currency=usd

# Actuator - Prometheus + Health in production
management.endpoints.web.exposure.include=health,prometheus
management.endpoint.health.show-details=never
management.prometheus.metrics.export.enabled=true

# Logging - production-level (JSON structured via logback-spring.xml)
logging.level.com.alquiler.furent=INFO
logging.level.org.springframework.security=WARN
logging.level.org.springframework.web=WARN
logging.level.org.springframework.cache=WARN

# Compression
server.compression.enabled=true
server.compression.mime-types=text/html,text/css,application/javascript,application/json
server.compression.min-response-size=1024

# Security Headers
server.servlet.session.cookie.max-age=900
