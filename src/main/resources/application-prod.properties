# ═══════════════════════════════════════════════════════
# FURENT - Production Configuration (SaaS Enterprise)
# ═══════════════════════════════════════════════════════
#
# REQUIRED ENVIRONMENT VARIABLES:
# --------------------------------
# MONGODB_URI              - MongoDB connection URI (e.g., mongodb://user:pass@host:27017/FurentDataBase)
# REDIS_HOST               - Redis server hostname or IP address
# REDIS_PORT               - Redis server port (default: 6379)
# REDIS_PASSWORD           - Redis authentication password (optional, leave empty if no auth)
# FURENT_ADMIN_PASSWORD    - Initial admin user password (CRITICAL: must be strong)
# JWT_SECRET               - Secret key for JWT token signing (base64 encoded, min 256 bits)
# MAIL_USERNAME            - SMTP email account username
# MAIL_PASSWORD            - SMTP email account password or app-specific password
# UPLOAD_DIR               - Directory path for file uploads (e.g., /var/furent/uploads)
#
# OPTIONAL ENVIRONMENT VARIABLES:
# --------------------------------
# PAYU_API_KEY             - PayU payment gateway API key
# PAYU_MERCHANT_ID         - PayU merchant identifier
# PAYU_ACCOUNT_ID          - PayU account identifier
# PAYU_URL                 - PayU gateway URL (production: https://checkout.payulatam.com/checkout-web-gateway-payu/)
#
# ═══════════════════════════════════════════════════════

# ═══════════════════════════════════════════════════════
# THYMELEAF - Template Engine
# ═══════════════════════════════════════════════════════
spring.thymeleaf.cache=true

# ═══════════════════════════════════════════════════════
# MONGODB - Database Connection
# ═══════════════════════════════════════════════════════
# REQUIRED: MongoDB connection URI with authentication
# Format: mongodb://username:password@host:port/database
# Example: mongodb://furent_user:secure_pass@mongodb.example.com:27017/FurentDataBase
spring.mongodb.uri=${MONGODB_URI}
spring.data.mongodb.auto-index-creation=true

# ═══════════════════════════════════════════════════════
# REDIS - Cache & Session Store
# ═══════════════════════════════════════════════════════
# REQUIRED: Redis server configuration for caching and session management
spring.data.redis.host=${REDIS_HOST}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.timeout=2000ms
spring.cache.type=redis
spring.cache.redis.time-to-live=600000
spring.cache.redis.cache-null-values=false

# ═══════════════════════════════════════════════════════
# SESSION SECURITY - Production Hardening
# ═══════════════════════════════════════════════════════
server.servlet.session.timeout=15m
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=true
server.servlet.session.cookie.same-site=strict
server.servlet.session.cookie.max-age=900

# ═══════════════════════════════════════════════════════
# FILE UPLOAD - Storage Configuration
# ═══════════════════════════════════════════════════════
# REQUIRED: Directory for uploaded files (product images, documents, etc.)
# Must have write permissions for the application user
# Example: /var/furent/uploads or /opt/furent/data/uploads
furent.upload.dir=${UPLOAD_DIR}
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
spring.servlet.multipart.file-size-threshold=0B

# ═══════════════════════════════════════════════════════
# ADMIN - Initial Administrator Account
# ═══════════════════════════════════════════════════════
# REQUIRED: Strong password for the initial admin user
# CRITICAL: Use a strong, unique password (min 12 chars, mixed case, numbers, symbols)
# This password is used to create the default admin account on first startup
furent.admin.password=${FURENT_ADMIN_PASSWORD}

# ═══════════════════════════════════════════════════════
# JWT - Authentication Token Configuration
# ═══════════════════════════════════════════════════════
# REQUIRED: Secret key for signing JWT tokens
# CRITICAL: Must be a strong, random base64-encoded string (min 256 bits)
# Generate with: openssl rand -base64 32
furent.jwt.secret=${JWT_SECRET}
furent.jwt.access-token-expiration=3600000
furent.jwt.refresh-token-expiration=2592000000

# ═══════════════════════════════════════════════════════
# EMAIL - SMTP Configuration
# ═══════════════════════════════════════════════════════
# REQUIRED: SMTP credentials for sending transactional emails
# (confirmations, password resets, notifications, receipts)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# Async Thread Pool for Email Sending
spring.task.execution.pool.core-size=2
spring.task.execution.pool.max-size=5
spring.task.execution.pool.queue-capacity=100
spring.task.execution.thread-name-prefix=email-async-

# ═══════════════════════════════════════════════════════
# ACTUATOR + PROMETHEUS - Observability
# ═══════════════════════════════════════════════════════
# Expose only health and metrics endpoints in production
management.endpoints.web.exposure.include=health,prometheus,metrics
management.endpoint.health.show-details=never
management.endpoint.health.show-components=never
management.prometheus.metrics.export.enabled=true
management.metrics.distribution.percentiles-histogram.http.server.requests=true
management.metrics.tags.application=${spring.application.name}

# ═══════════════════════════════════════════════════════
# LOGGING - Production Level
# ═══════════════════════════════════════════════════════
# INFO level for application, WARN for frameworks
# Structured JSON logging configured in logback-spring.xml
logging.level.com.alquiler.furent=INFO
logging.level.org.springframework.security=WARN
logging.level.org.springframework.web=WARN
logging.level.org.springframework.cache=WARN
logging.level.org.springframework.data.mongodb=WARN

# ═══════════════════════════════════════════════════════
# PERFORMANCE - Compression & Optimization
# ═══════════════════════════════════════════════════════
server.compression.enabled=true
server.compression.mime-types=text/html,text/css,application/javascript,application/json
server.compression.min-response-size=1024

# ═══════════════════════════════════════════════════════
# PAYU - Payment Gateway (Optional)
# ═══════════════════════════════════════════════════════
# OPTIONAL: PayU payment gateway configuration for Colombia
# Leave empty if not using PayU integration
furent.payu.api-key=${PAYU_API_KEY:}
furent.payu.merchant-id=${PAYU_MERCHANT_ID:}
furent.payu.account-id=${PAYU_ACCOUNT_ID:}
furent.payu.url=${PAYU_URL:https://checkout.payulatam.com/checkout-web-gateway-payu/}
furent.payu.currency=COP
furent.payu.test=0

# ═══════════════════════════════════════════════════════
# FEATURE FLAGS - Production Features
# ═══════════════════════════════════════════════════════
furent.features.cache-enabled=true
furent.features.notifications-enabled=true
furent.features.reviews-enabled=true
furent.features.export-pdf-enabled=true
furent.features.analytics-enabled=true
furent.features.payu-enabled=${PAYU_ENABLED:false}

# ═══════════════════════════════════════════════════════
# MULTI-TENANT
# ═══════════════════════════════════════════════════════
furent.tenant.default-slug=default
