# ═══════════════════════════════════════════════════════
# FURENT - Development Configuration
# ═══════════════════════════════════════════════════════

# Thymeleaf - hot reload in development
spring.thymeleaf.cache=false

# MongoDB (local)
spring.mongodb.uri=mongodb://localhost:27017/FurentDataBase

# Redis desactivado en dev (no requiere Redis corriendo)
spring.cache.type=simple
furent.features.cache-enabled=false

# Admin password (only for development)
furent.admin.password=admin123

# Actuator - full access in development
management.endpoints.web.exposure.include=health,info,metrics,env,prometheus,caches
management.endpoint.health.show-details=always

# Logging - verbose in development
logging.level.com.alquiler.furent=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.cache=DEBUG

# Email - disabled in dev (logs to console)
furent.email.enabled=false

# Session - longer timeout for development
server.servlet.session.timeout=60m

# Feature Flags
furent.features.notifications-enabled=true
furent.features.reviews-enabled=true
furent.features.export-pdf-enabled=true
furent.features.analytics-enabled=true
furent.features.payu-enabled=true

# Rate Limiting - Deshabilitado en desarrollo
furent.rate-limit.enabled=false

# PayU - Checkout Web (Sandbox)
furent.payu.api-key=4Vj8eK4rpeq6scS930ZasY44uz
furent.payu.merchant-id=508029
furent.payu.account-id=512321
furent.payu.url=https://sandbox.checkout.payulatam.com/checkout-web-gateway-payu/
furent.payu.currency=COP
furent.payu.test=1
