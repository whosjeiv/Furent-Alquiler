spring.application.name=Furent
server.port=8080
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# ═══════════════════════════════════════════════════════
# THYMELEAF
# ═══════════════════════════════════════════════════════
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# ═══════════════════════════════════════════════════════
# MONGODB
# ═══════════════════════════════════════════════════════
spring.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/FurentDataBase}
spring.data.mongodb.auto-index-creation=true

# ═══════════════════════════════════════════════════════
# REDIS CACHE
# ═══════════════════════════════════════════════════════
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.timeout=2000ms
spring.cache.type=redis
spring.cache.redis.time-to-live=600000
spring.cache.redis.cache-null-values=false

# ═══════════════════════════════════════════════════════
# SESSION SECURITY
# ═══════════════════════════════════════════════════════
server.servlet.session.timeout=30m
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.same-site=lax

# ═══════════════════════════════════════════════════════
# FILE UPLOAD
# ═══════════════════════════════════════════════════════
spring.servlet.multipart.max-file-size=-1
spring.servlet.multipart.max-request-size=-1
spring.servlet.multipart.file-size-threshold=0B
server.tomcat.max-http-form-post-size=-1
server.tomcat.max-swallow-size=-1
server.tomcat.max-part-count=-1
server.tomcat.max-parameter-count=-1

# ═══════════════════════════════════════════════════════
# ADMIN
# ═══════════════════════════════════════════════════════
furent.admin.password=${ADMIN_PASSWORD:admin123}

# ═══════════════════════════════════════════════════════
# ACTUATOR + PROMETHEUS OBSERVABILIDAD
# ═══════════════════════════════════════════════════════
management.endpoints.web.exposure.include=health,info,prometheus,metrics,caches
management.endpoint.health.show-details=when-authorized
management.endpoint.health.show-components=when-authorized
management.prometheus.metrics.export.enabled=true
management.metrics.distribution.percentiles-histogram.http.server.requests=true
management.metrics.tags.application=${spring.application.name}
management.info.env.enabled=true
info.app.name=Furent
info.app.version=2.0.0
info.app.description=Plataforma SaaS de alquiler de mobiliarios para eventos
info.app.architecture=Clean Architecture - Modular Monolith
info.app.database=MongoDB

# ═══════════════════════════════════════════════════════
# LOGGING
# ═══════════════════════════════════════════════════════
logging.level.com.alquiler.furent=DEBUG
logging.level.org.springframework.security=WARN
logging.level.org.springframework.cache=DEBUG

# ═══════════════════════════════════════════════════════
# EMAIL (Gmail SMTP)
# ═══════════════════════════════════════════════════════
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=valdeslastresjosedaniel@gmail.com
