<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head th:replace="~{fragments/layout :: head}"></head>
<body class="bg-surface-50 font-sans text-surface-800 min-h-screen flex flex-col">

    <div th:replace="~{fragments/layout :: nav}"></div>

    <main class="flex-1 pt-[68px]">
        <div class="min-h-[calc(100vh-68px)] flex items-center justify-center px-4 py-12">
            <div class="w-full max-w-lg fade-in-up">
                <div class="bg-white rounded-2xl p-8 shadow-card border border-surface-100">
                    <!-- Header -->
                    <div class="text-center mb-8">
                        <div class="w-16 h-16 bg-gradient-to-br from-furent-400 to-furent-600 rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-md">
                            <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" stroke-width="1.75" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M10.5 1.5H8.25A2.25 2.25 0 006 3.75v16.5a2.25 2.25 0 002.25 2.25h7.5A2.25 2.25 0 0018 20.25V3.75a2.25 2.25 0 00-2.25-2.25H13.5m-3 0V3h3V1.5m-3 0h3m-3 8.25h3m-3 3h3m-3 3h3"/>
                            </svg>
                        </div>
                        <h1 class="text-2xl font-bold text-surface-900 mb-1">Configurar Google Authenticator</h1>
                        <p class="text-sm text-surface-500">Escanea el QR con tu app para activar 2FA</p>
                    </div>

                    <!-- Error flash -->
                    <div th:if="${totpError}" class="p-3 bg-red-50 border border-red-200 text-red-700 rounded-xl text-sm mb-6 flex items-center gap-2">
                        <svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m9-.75a9 9 0 11-18 0 9 9 0 0118 0zm-9 3.75h.008v.008H12v-.008z"/></svg>
                        <span th:text="${totpError}"></span>
                    </div>

                    <!-- Steps -->
                    <div class="space-y-6">
                        <!-- Step 1 -->
                        <div class="flex gap-4">
                            <div class="w-8 h-8 rounded-full bg-furent-500 text-white text-sm font-bold flex items-center justify-center flex-shrink-0">1</div>
                            <div>
                                <p class="text-sm font-semibold text-surface-800">Instala Google Authenticator</p>
                                <p class="text-xs text-surface-500 mt-0.5">Disponible en <a href="https://play.google.com/store/apps/details?id=com.google.android.apps.authenticator2" target="_blank" class="text-furent-500 underline">Android</a> y <a href="https://apps.apple.com/app/google-authenticator/id388497605" target="_blank" class="text-furent-500 underline">iOS</a></p>
                            </div>
                        </div>

                        <!-- Step 2: QR -->
                        <div class="flex gap-4">
                            <div class="w-8 h-8 rounded-full bg-furent-500 text-white text-sm font-bold flex items-center justify-center flex-shrink-0">2</div>
                            <div class="flex-1">
                                <p class="text-sm font-semibold text-surface-800 mb-3">Escanea este código QR</p>
                                <div class="flex justify-center">
                                    <img th:src="${totpQr}" alt="QR Google Authenticator" class="w-44 h-44 rounded-xl border border-surface-200 shadow-sm">
                                </div>
                                <!-- Manual key -->
                                <div class="mt-3 p-3 bg-surface-50 rounded-xl border border-surface-200">
                                    <p class="text-xs text-surface-500 mb-1">O ingresa esta clave manualmente:</p>
                                    <p id="totpSecretDisplay" class="text-sm font-mono font-bold text-surface-800 break-all select-all" th:text="${totpSecret}"></p>
                                </div>
                            </div>
                        </div>

                        <!-- Step 3: Verify -->
                        <div class="flex gap-4">
                            <div class="w-8 h-8 rounded-full bg-furent-500 text-white text-sm font-bold flex items-center justify-center flex-shrink-0">3</div>
                            <div class="flex-1">
                                <p class="text-sm font-semibold text-surface-800 mb-3">Ingresa el código de 6 dígitos</p>
                                <form th:action="@{/configuracion/2fa/enable}" method="post">
                                    <input type="hidden" name="secret" th:value="${totpSecret}">
                                    <input id="totpCode" type="text" name="code" placeholder="000000" maxlength="6" autocomplete="one-time-code"
                                           class="w-full px-4 py-3 bg-surface-50 border border-surface-200 rounded-xl text-2xl font-mono text-center font-bold tracking-[0.5em] focus:outline-none focus:ring-2 focus:ring-furent-500/30 focus:border-furent-500 transition-all">
                                    <button type="submit" id="verifyBtn" disabled
                                            class="mt-4 w-full py-3 bg-surface-300 text-white font-semibold rounded-xl transition-all disabled:cursor-not-allowed" >
                                        Activar autenticación 2FA
                                    </button>
                                </form>
                            </div>
                        </div>
                    </div>

                    <p class="text-center text-sm text-surface-500 mt-8">
                        <a th:href="@{/configuracion}" class="text-furent-500 hover:text-furent-600 font-medium transition-colors">← Volver a configuración</a>
                    </p>
                </div>
            </div>
        </div>
    </main>

    <script th:src="@{/js/app.js}"></script>
    <script>
    const codeInput = document.getElementById('totpCode');
    const verifyBtn = document.getElementById('verifyBtn');

    codeInput.addEventListener('input', function() {
        this.value = this.value.replace(/\D/g, '').slice(0, 6);
        const ready = this.value.length === 6;
        verifyBtn.disabled = !ready;
        verifyBtn.className = ready
            ? 'mt-4 w-full py-3 bg-surface-900 text-white font-semibold rounded-xl hover:bg-surface-800 transition-all cursor-pointer'
            : 'mt-4 w-full py-3 bg-surface-300 text-white font-semibold rounded-xl transition-all disabled:cursor-not-allowed';
    });
    </script>
</body>
</html>
