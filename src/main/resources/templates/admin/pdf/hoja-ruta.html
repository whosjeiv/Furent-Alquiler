<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <style>
        body { font-family: 'DejaVu Sans', sans-serif; color: #333; margin: 0; padding: 20px; }
        .header { text-align: center; border-bottom: 2px solid #333; padding-bottom: 10px; margin-bottom: 20px; }
        .header h1 { margin: 0; color: #1a1a1a; }
        .details { margin-bottom: 30px; }
        .details p { margin: 5px 0; font-size: 14px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { background-color: #f2f2f2; border: 1px solid #ddd; padding: 12px; text-align: left; font-size: 12px; }
        td { border: 1px solid #ddd; padding: 12px; text-align: left; font-size: 11px; }
        .badge { padding: 4px 8px; border-radius: 4px; font-weight: bold; font-size: 10px; }
        .entrega { background-color: #dbeafe; color: #1e40af; }
        .recogida { background-color: #fef3c7; color: #92400e; }
        .footer { margin-top: 50px; font-size: 10px; color: #777; text-align: center; }
        .signature { margin-top: 50px; width: 100%; }
        .signature-box { border-top: 1px solid #333; width: 45%; float: left; margin: 20px 2%; padding-top: 5px; text-align: center; font-size: 12px; }
    </style>
</head>
<body>
    <div class="header">
        <h1>Furent - Hoja de Ruta</h1>
        <p th:text="'Fecha de Operación: ' + ${#temporals.format(fecha, 'dd/MM/yyyy')}"></p>
    </div>

    <div class="details">
        <p th:text="'Total de Operaciones: ' + ${#lists.size(reservas)}"></p>
        <p th:text="'Entregas Programadas: ' + ${totalEntregas}"></p>
        <p th:text="'Recogidas Programadas: ' + ${totalRecogidas}"></p>
    </div>

    <table>
        <thead>
            <tr>
                <th>Operación</th>
                <th>Cliente</th>
                <th>Dirección</th>
                <th>Mobiliario</th>
                <th>Notas</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="r : ${reservas}">
                <td>
                    <span th:if="${r.fechaInicio == fecha}" class="badge entrega">ENTREGA</span>
                    <span th:if="${r.fechaFin == fecha}" class="badge recogida">RECOGIDA</span>
                </td>
                <td th:text="${r.usuarioNombre}"></td>
                <td th:text="${r.direccionEvento}"></td>
                <td>
                    <ul>
                        <li th:each="item : ${r.items}" th:text="${item.productoNombre} + ' (x' + ${item.cantidad} + ')'"></li>
                    </ul>
                </td>
                <td th:text="${r.notasEvento}"></td>
            </tr>
        </tbody>
    </table>

    <div class="signature">
        <div class="signature-box">Responsable de Almacén</div>
        <div class="signature-box">Responsable de Transporte</div>
    </div>

    <div class="footer">
        <p>Generado automáticamente por Furent Workspace Admin</p>
    </div>
</body>
</html>
