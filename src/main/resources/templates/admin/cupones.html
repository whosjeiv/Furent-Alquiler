<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{fragments/admin-layout :: layout(~{::title}, ~{::main}, 'cupones')}">
<head><title>Cupones — Admin Furent</title></head>
<body>
    <main>
        <!-- Header -->
        <div class="px-10 pt-10 pb-6">
            <div class="flex items-center justify-between">
                <div>
                    <h1 class="text-3xl font-bold text-surface-900 dark:text-white tracking-tight">Gestión de Cupones</h1>
                    <p class="text-surface-500 dark:text-surface-400 mt-1">Crear y administrar cupones de descuento</p>
                </div>
                <button onclick="openCouponModal()" class="px-5 py-2.5 bg-furent-500 hover:bg-furent-600 text-white rounded-xl font-semibold text-sm transition-all shadow-lg shadow-furent-500/20">
                    + Nuevo Cupón
                </button>
            </div>
        </div>

        <!-- Coupons Table -->
        <div class="px-10">
            <div class="bg-white dark:bg-surface-900 rounded-2xl border border-surface-200 dark:border-surface-700 overflow-hidden shadow-glass">
                <table id="couponTable" class="premium-table w-full">
                    <thead>
                        <tr>
                            <th>Código</th>
                            <th>Tipo</th>
                            <th>Valor</th>
                            <th>Válido</th>
                            <th>Usos</th>
                            <th>Monto Mín.</th>
                            <th>Estado</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="c : ${cupones}" th:if="${c != null}">
                            <td>
                                <span class="font-mono font-bold text-furent-600 dark:text-furent-400 bg-furent-50 dark:bg-furent-900/30 px-3 py-1 rounded-lg" th:text="${c.codigo ?: '—'}">CUPON</span>
                            </td>
                            <td class="dark:text-surface-300" th:text="${c.tipo ?: '—'}">PORCENTAJE</td>
                            <td>
                                <span th:if="${c.tipo == 'PORCENTAJE'}" th:text="${(c.valor != null ? c.valor : 0) + '%'}">10%</span>
                                <span th:if="${c.tipo != 'PORCENTAJE'}" th:text="'$' + ${#numbers.formatDecimal(c.valor != null ? c.valor : 0, 0, 'COMMA', 0, 'POINT')}">$10,000</span>
                            </td>
                            <td>
                                <span class="text-sm dark:text-surface-400" th:text="${(c.validoDesde != null ? c.validoDesde : '—') + ' — ' + (c.validoHasta != null ? c.validoHasta : '—')}">Fechas</span>
                            </td>
                            <td class="dark:text-surface-300">
                                <span th:text="${c.usosActuales + '/' + c.usosMaximos}">0/100</span>
                            </td>
                            <td class="dark:text-surface-300" th:text="'$' + ${#numbers.formatDecimal(c.montoMinimo != null ? c.montoMinimo : 0, 0, 'COMMA', 0, 'POINT')}">$0</td>
                            <td>
                                <span th:if="${c.activo}" class="inline-flex items-center px-2.5 py-1 rounded-full text-xs font-semibold bg-green-50 dark:bg-green-900/30 text-green-600 dark:text-green-400">Activo</span>
                                <span th:unless="${c.activo}" class="inline-flex items-center px-2.5 py-1 rounded-full text-xs font-semibold bg-red-50 dark:bg-red-900/30 text-red-500 dark:text-red-400">Inactivo</span>
                            </td>
                            <td>
                                <div class="flex items-center gap-2">
                                    <button class="text-blue-500 hover:text-blue-700 dark:text-blue-400 dark:hover:text-blue-300 p-1 btn-edit-coupon" title="Editar"
                                            th:data-id="${c.id}"
                                            th:data-codigo="${c.codigo ?: ''}"
                                            th:data-tipo="${c.tipo ?: 'PORCENTAJE'}"
                                            th:data-valor="${c.valor != null ? c.valor : 0}"
                                            th:data-desde="${c.validoDesde != null ? c.validoDesde : ''}"
                                            th:data-hasta="${c.validoHasta != null ? c.validoHasta : ''}"
                                            th:data-usos="${c.usosMaximos}"
                                            th:data-montomin="${c.montoMinimo != null ? c.montoMinimo : 0}">
                                        <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M16.862 4.487l1.687-1.688a1.875 1.875 0 112.652 2.652L10.582 16.07a4.5 4.5 0 01-1.897 1.13L6 18l.8-2.685a4.5 4.5 0 011.13-1.897l8.932-8.931zm0 0L19.5 7.125M18 14v4.75A2.25 2.25 0 0115.75 21H5.25A2.25 2.25 0 013 18.75V8.25A2.25 2.25 0 015.25 6H10"/></svg>
                                    </button>
                                    <form th:action="@{/admin/cupones/eliminar/{id}(id=${c.id})}" method="post"
                                          onsubmit="return confirm('¿Eliminar este cupón?')">
                                        <button type="submit" class="text-red-500 hover:text-red-700 dark:text-red-400 dark:hover:text-red-300 p-1" title="Eliminar">
                                            <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M14.74 9l-.346 9m-4.788 0L9.26 9m9.968-3.21c.342.052.682.107 1.022.166m-1.022-.165L18.16 19.673a2.25 2.25 0 01-2.244 2.077H8.084a2.25 2.25 0 01-2.244-2.077L4.772 5.79m14.456 0a48.108 48.108 0 00-3.478-.397m-12 .562c.34-.059.68-.114 1.022-.165m0 0a48.11 48.11 0 013.478-.397m7.5 0v-.916c0-1.18-.91-2.164-2.09-2.201a51.964 51.964 0 00-3.32 0c-1.18.037-2.09 1.022-2.09 2.201v.916m7.5 0a48.667 48.667 0 00-7.5 0"/></svg>
                                        </button>
                                    </form>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Empty State -->
        <div th:if="${cupones == null or cupones.isEmpty()}" class="px-10 mt-6">
            <div class="bg-white dark:bg-surface-900 rounded-2xl border border-surface-200 dark:border-surface-700 p-12 text-center">
                <svg class="w-16 h-16 mx-auto text-surface-300 dark:text-surface-600 mb-4" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 14.25l6-6m4.5-3.493V21.75l-3.75-1.5-3.75 1.5-3.75-1.5-3.75 1.5V4.757c0-1.108.806-2.057 1.907-2.185a48.507 48.507 0 0111.186 0c1.1.128 1.907 1.077 1.907 2.185zM9.75 9h.008v.008H9.75V9zm.375 0a.375.375 0 11-.75 0 .375.375 0 01.75 0zm4.125 4.5h.008v.008h-.008V13.5zm.375 0a.375.375 0 11-.75 0 .375.375 0 01.75 0z"/></svg>
                <h3 class="text-lg font-semibold text-surface-700 dark:text-surface-300">No hay cupones creados</h3>
                <p class="text-surface-400 dark:text-surface-500 mt-1">Crea tu primer cupón de descuento con el botón de arriba</p>
            </div>
        </div>

        <!-- Coupon Modal -->
        <div id="couponModal" class="fixed inset-0 bg-black/50 backdrop-blur-sm z-50 hidden items-center justify-center">
            <div class="bg-white dark:bg-surface-800 rounded-3xl shadow-2xl w-full max-w-lg mx-4 p-8">
                <h2 id="couponModalTitle" class="text-2xl font-bold text-surface-900 dark:text-white mb-6">Nuevo Cupón</h2>
                <form th:action="@{/admin/cupones/guardar}" method="post" class="space-y-4">
                    <input type="hidden" id="couponId" name="id">
                    <div>
                        <label class="block text-sm font-medium text-surface-700 dark:text-surface-300 mb-1">Código</label>
                        <input id="couponCodigo" name="codigo" type="text" required placeholder="ej. DESCUENTO20"
                               class="w-full px-4 py-2.5 rounded-xl border border-surface-200 dark:border-surface-600 bg-white dark:bg-surface-700 text-surface-900 dark:text-white focus:border-furent-400 focus:ring-2 focus:ring-furent-100 dark:focus:ring-furent-900/50 outline-none uppercase">
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium text-surface-700 dark:text-surface-300 mb-1">Tipo</label>
                            <select id="couponTipo" name="tipo" class="w-full px-4 py-2.5 rounded-xl border border-surface-200 dark:border-surface-600 bg-white dark:bg-surface-700 text-surface-900 dark:text-white focus:border-furent-400 outline-none">
                                <option value="PORCENTAJE">Porcentaje (%)</option>
                                <option value="MONTO_FIJO">Monto Fijo ($)</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-surface-700 dark:text-surface-300 mb-1">Valor</label>
                            <input id="couponValor" name="valor" type="number" step="0.01" required
                                   class="w-full px-4 py-2.5 rounded-xl border border-surface-200 dark:border-surface-600 bg-white dark:bg-surface-700 text-surface-900 dark:text-white focus:border-furent-400 outline-none">
                        </div>
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium text-surface-700 dark:text-surface-300 mb-1">Válido desde</label>
                            <input id="couponDesde" name="validoDesde" type="date" required
                                   class="w-full px-4 py-2.5 rounded-xl border border-surface-200 dark:border-surface-600 bg-white dark:bg-surface-700 text-surface-900 dark:text-white focus:border-furent-400 outline-none">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-surface-700 dark:text-surface-300 mb-1">Válido hasta</label>
                            <input id="couponHasta" name="validoHasta" type="date" required
                                   class="w-full px-4 py-2.5 rounded-xl border border-surface-200 dark:border-surface-600 bg-white dark:bg-surface-700 text-surface-900 dark:text-white focus:border-furent-400 outline-none">
                        </div>
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium text-surface-700 dark:text-surface-300 mb-1">Usos máximos</label>
                            <input id="couponUsos" name="usosMaximos" type="number" required value="100"
                                   class="w-full px-4 py-2.5 rounded-xl border border-surface-200 dark:border-surface-600 bg-white dark:bg-surface-700 text-surface-900 dark:text-white focus:border-furent-400 outline-none">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-surface-700 dark:text-surface-300 mb-1">Monto mínimo ($)</label>
                            <input id="couponMontoMin" name="montoMinimo" type="number" step="0.01" value="0"
                                   class="w-full px-4 py-2.5 rounded-xl border border-surface-200 dark:border-surface-600 bg-white dark:bg-surface-700 text-surface-900 dark:text-white focus:border-furent-400 outline-none">
                        </div>
                    </div>
                    <div class="flex items-center gap-3 pt-4">
                        <button type="submit" class="flex-1 py-3 bg-furent-500 hover:bg-furent-600 text-white rounded-xl font-semibold transition-all">
                            Guardar
                        </button>
                        <button type="button" onclick="closeCouponModal()" class="flex-1 py-3 bg-surface-100 dark:bg-surface-700 hover:bg-surface-200 dark:hover:bg-surface-600 text-surface-700 dark:text-surface-300 rounded-xl font-semibold transition-all">
                            Cancelar
                        </button>
                    </div>
                </form>
            </div>
        </div>

        <script th:inline="none">
            $(document).ready(function() {
                $('#couponTable').DataTable({
                    language: { url: 'https://cdn.datatables.net/plug-ins/1.13.6/i18n/es-ES.json' },
                    pageLength: 10,
                    order: [[3, 'desc']]
                });

                $(document).on('click', '.btn-edit-coupon', function() {
                    var btn = $(this);
                    editCoupon(
                        btn.data('id'),
                        btn.data('codigo'),
                        btn.data('tipo'),
                        btn.data('valor'),
                        btn.data('desde'),
                        btn.data('hasta'),
                        btn.data('usos'),
                        btn.data('montomin')
                    );
                });
            });

            function openCouponModal() {
                document.getElementById('couponModalTitle').textContent = 'Nuevo Cupón';
                document.getElementById('couponId').value = '';
                document.getElementById('couponCodigo').value = '';
                document.getElementById('couponTipo').value = 'PORCENTAJE';
                document.getElementById('couponValor').value = '';
                document.getElementById('couponDesde').value = '';
                document.getElementById('couponHasta').value = '';
                document.getElementById('couponUsos').value = '100';
                document.getElementById('couponMontoMin').value = '0';
                document.getElementById('couponModal').classList.remove('hidden');
                document.getElementById('couponModal').classList.add('flex');
            }

            function editCoupon(id, codigo, tipo, valor, desde, hasta, usos, montoMin) {
                document.getElementById('couponModalTitle').textContent = 'Editar Cupón';
                document.getElementById('couponId').value = id || '';
                document.getElementById('couponCodigo').value = codigo || '';
                document.getElementById('couponTipo').value = tipo || 'PORCENTAJE';
                document.getElementById('couponValor').value = valor || '';
                document.getElementById('couponDesde').value = desde || '';
                document.getElementById('couponHasta').value = hasta || '';
                document.getElementById('couponUsos').value = usos || '100';
                document.getElementById('couponMontoMin').value = montoMin || '0';
                document.getElementById('couponModal').classList.remove('hidden');
                document.getElementById('couponModal').classList.add('flex');
            }

            function closeCouponModal() {
                document.getElementById('couponModal').classList.add('hidden');
                document.getElementById('couponModal').classList.remove('flex');
            }

            document.getElementById('couponModal').addEventListener('click', function(e) {
                if (e.target === this) closeCouponModal();
            });
        </script>
    </main>
</body>
</html>
