<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{fragments/admin-layout :: layout(~{::title}, ~{::main}, 'logistica')}">
<head>
    <title>Logística Operativa — Furent Admin</title>
</head>
<body>
<main>
    <div class="px-4 sm:px-6 lg:px-8 py-6 max-w-[92rem] mx-auto opacity-0 animate-[fadeIn_0.45s_ease-out_forwards]">
        <div class="bg-white border border-surface-200 rounded-3xl p-5 sm:p-6 shadow-sm mb-5">
            <div class="flex flex-col xl:flex-row xl:items-center xl:justify-between gap-5">
                <div>
                    <h1 class="text-2xl sm:text-3xl font-black text-surface-900 tracking-tight">Centro de Logística</h1>
                    <p class="text-sm font-medium text-surface-500 mt-1">Vista operativa compacta para entregas, retornos y seguimiento diario</p>
                </div>
                <div class="flex flex-wrap items-center gap-2.5">
                    <div class="inline-flex items-center p-1 rounded-full border border-surface-200 bg-surface-100">
                        <button id="viewCal" type="button" onclick="toggleView('cal')" class="px-4 py-2 rounded-full text-[11px] font-black tracking-wide bg-white text-surface-900 border border-surface-200">Calendario</button>
                        <button id="viewList" type="button" onclick="toggleView('list')" class="px-4 py-2 rounded-full text-[11px] font-black tracking-wide text-surface-600 hover:text-surface-900">Lista mes</button>
                    </div>
                    <button type="button" onclick="refreshToday(this)" id="btnRefresh" class="px-4 py-2.5 bg-white border border-surface-300 text-surface-700 rounded-full text-[11px] font-black tracking-wide hover:bg-surface-50 transition-colors flex items-center gap-2">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2.4" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993 0l3.181 3.183a8.25 8.25 0 0013.803-3.7M4.031 9.865a8.25 8.25 0 0113.803-3.7l3.181 3.182m0-4.991v4.99"/></svg>
                        Actualizar
                    </button>
                    <button type="button" onclick="window.print()" class="px-4 py-2.5 bg-white border border-surface-300 text-surface-700 rounded-full text-[11px] font-black tracking-wide hover:bg-surface-50 transition-colors flex items-center gap-2">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M6.75 8.25V6A2.25 2.25 0 019 3.75h6A2.25 2.25 0 0117.25 6v2.25M6.75 15.75h10.5M6.75 12h10.5M5.25 8.25h13.5A2.25 2.25 0 0121 10.5v6A2.25 2.25 0 0118.75 18.75H5.25A2.25 2.25 0 013 16.5v-6a2.25 2.25 0 012.25-2.25Z"/></svg>
                        Imprimir
                    </button>
                    <button type="button" onclick="generateRouteSheet()" class="px-4 py-2.5 bg-surface-900 border border-surface-900 text-white rounded-full text-[11px] font-black tracking-wide hover:bg-surface-800 transition-colors flex items-center gap-2">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2.4" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 00-3.375-3.375h-1.5A1.125 1.125 0 0113.5 7.125v-1.5A3.375 3.375 0 0010.125 2.25H8.25m0 12.75h7.5m-7.5 3H12M10.5 2.25H5.625A1.125 1.125 0 004.5 3.375v17.25a1.125 1.125 0 001.125 1.125h12.75a1.125 1.125 0 001.125-1.125V11.25a9 9 0 00-9-9z"></path></svg>
                        Exportar hoja de ruta
                    </button>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 xl:grid-cols-12 gap-5">
            <section class="xl:col-span-4 space-y-5">
                <div class="grid grid-cols-3 gap-3">
                    <article class="rounded-2xl border border-blue-200 bg-blue-50 p-4">
                        <p class="text-[10px] font-black text-blue-700 uppercase tracking-widest mb-2">Entregas</p>
                        <p id="entregasHoyCount" class="text-3xl font-black text-blue-900 leading-none">0</p>
                    </article>
                    <article class="rounded-2xl border border-amber-200 bg-amber-50 p-4">
                        <p class="text-[10px] font-black text-amber-700 uppercase tracking-widest mb-2">Retornos</p>
                        <p id="retornosHoyCount" class="text-3xl font-black text-amber-900 leading-none">0</p>
                    </article>
                    <article class="rounded-2xl border border-emerald-200 bg-emerald-50 p-4">
                        <p class="text-[10px] font-black text-emerald-700 uppercase tracking-widest mb-2">Total</p>
                        <p id="totalHoyCount" class="text-3xl font-black text-emerald-900 leading-none">0</p>
                    </article>
                </div>

                <div class="bg-white border border-surface-200 rounded-3xl shadow-sm overflow-hidden">
                    <div class="px-5 py-4 border-b border-surface-200 bg-surface-50">
                        <h2 class="text-sm font-black text-surface-900 tracking-wide">Operaciones del día</h2>
                        <p class="text-xs font-semibold text-surface-500 mt-1">Filtra por fecha, tipo y cliente para reducir tiempos de búsqueda</p>
                        <div class="grid grid-cols-1 sm:grid-cols-2 gap-2.5 mt-4">
                            <input id="logisticaDate" type="date" class="h-10 rounded-xl border border-surface-300 px-3 text-xs font-bold text-surface-800 bg-white focus:outline-none focus:ring-2 focus:ring-surface-300" />
                            <select id="logisticaTipoFiltro" class="h-10 rounded-xl border border-surface-300 px-3 text-xs font-bold text-surface-800 bg-white focus:outline-none focus:ring-2 focus:ring-surface-300">
                                <option value="todos">Todos los tipos</option>
                                <option value="entregas">Solo entregas</option>
                                <option value="retornos">Solo retornos</option>
                            </select>
                        </div>
                        <div class="mt-2.5">
                            <input id="logisticaSearch" type="text" placeholder="Buscar por cliente, dirección o código..." class="h-10 w-full rounded-xl border border-surface-300 px-3 text-xs font-semibold text-surface-700 bg-white focus:outline-none focus:ring-2 focus:ring-surface-300" />
                        </div>
                    </div>
                    <div id="todayOperations" class="max-h-[58vh] overflow-y-auto p-4 space-y-3 custom-scrollbar bg-surface-50/60">
                        <div class="text-center py-12">
                            <div class="w-8 h-8 rounded-full border-2 border-surface-300 border-t-surface-800 animate-spin mx-auto mb-3"></div>
                            <p class="text-[11px] font-black text-surface-500 uppercase tracking-widest">Cargando agenda...</p>
                        </div>
                    </div>
                </div>
            </section>

            <section class="xl:col-span-8">
                <div class="bg-white border border-surface-200 rounded-3xl shadow-sm p-4 sm:p-5 h-full min-h-[42rem] flex flex-col">
                    <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-3 pb-4 border-b border-surface-200">
                        <h2 class="text-base sm:text-lg font-black text-surface-900 tracking-tight">Calendario de despliegue operativo</h2>
                        <div class="inline-flex items-center gap-4 rounded-full border border-surface-200 bg-surface-50 px-4 py-2 text-[11px] font-black tracking-wide text-surface-600">
                            <span class="inline-flex items-center gap-1.5"><span class="w-2.5 h-2.5 rounded-full bg-blue-600"></span>Entrega</span>
                            <span class="inline-flex items-center gap-1.5"><span class="w-2.5 h-2.5 rounded-full bg-amber-500"></span>Retorno</span>
                        </div>
                    </div>
                    <div id="calendar" class="custom-calendar mt-4 rounded-2xl border border-surface-100 overflow-hidden flex-1"></div>
                </div>
            </section>
        </div>
    </div>

    <link href='https://cdn.jsdelivr.net/npm/fullcalendar@5.11.3/main.min.css' rel='stylesheet' />
    <script src='https://cdn.jsdelivr.net/npm/fullcalendar@5.11.3/main.min.js'></script>
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@5.11.3/locales/es.js"></script>

    <style>
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .custom-scrollbar::-webkit-scrollbar { width: 7px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 9999px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        .custom-calendar { font-family: 'Outfit', sans-serif !important; }
        .custom-calendar .fc-toolbar { margin-bottom: .85rem !important; }
        .custom-calendar .fc-toolbar-title { font-size: 1.05rem !important; font-weight: 900 !important; color: #18181b !important; letter-spacing: .02em; text-transform: capitalize !important; }
        .custom-calendar .fc-button-primary { background: #fff !important; color: #27272a !important; border: 1px solid #d4d4d8 !important; border-radius: 9999px !important; text-transform: uppercase !important; font-weight: 800 !important; font-size: .68rem !important; letter-spacing: .06em !important; padding: .45rem .95rem !important; box-shadow: none !important; }
        .custom-calendar .fc-button-primary:hover { background: #f4f4f5 !important; border-color: #a1a1aa !important; }
        .custom-calendar .fc-button-primary:disabled { opacity: .45 !important; }
        .custom-calendar .fc-button-active { background: #18181b !important; border-color: #18181b !important; color: #fff !important; }
        .custom-calendar .fc-col-header-cell { background: #fafafa !important; border-color: #e4e4e7 !important; }
        .custom-calendar .fc-col-header-cell-cushion { color: #71717a !important; font-size: .67rem !important; font-weight: 900 !important; text-transform: uppercase !important; letter-spacing: .08em !important; padding: .6rem 0 !important; }
        .custom-calendar .fc-daygrid-day, .custom-calendar .fc-scrollgrid td, .custom-calendar .fc-scrollgrid th { border-color: #e4e4e7 !important; }
        .custom-calendar .fc-daygrid-day-top { justify-content: flex-end; }
        .custom-calendar .fc-daygrid-day-number { color: #18181b !important; font-weight: 800 !important; font-size: .8rem !important; padding: .25rem .45rem !important; border-radius: 9999px !important; }
        .custom-calendar .fc-day-today { background: #f8fafc !important; }
        .custom-calendar .fc-day-today .fc-daygrid-day-number { background: #18181b !important; color: #fff !important; }
        .custom-calendar .fc-event { border: none !important; border-radius: 9999px !important; padding: 3px 8px !important; margin: 2px 6px !important; font-size: .68rem !important; font-weight: 800 !important; letter-spacing: .02em; }
        .custom-calendar .fc-list-day-cushion { background: #fafafa !important; }
        .custom-calendar .fc-list-event-title { font-weight: 700 !important; }
        .custom-calendar .fc-list-event-time { color: #71717a !important; font-size: .74rem !important; }
        .swal-logistica-popup { border-radius: 1.5rem !important; border: 1px solid #e4e4e7 !important; overflow: hidden !important; padding: 0 !important; }
        .swal-logistica-plain { border-radius: 1rem !important; }
    </style>

    <script th:inline="javascript">
        let calendar;
        let allCalendarEvents = [];

        function toDateKey(date) {
            const d = new Date(date);
            const y = d.getFullYear();
            const m = String(d.getMonth() + 1).padStart(2, '0');
            const day = String(d.getDate()).padStart(2, '0');
            return `${y}-${m}-${day}`;
        }

        function escapeHtml(value) {
            return String(value ?? '').replace(/[&<>"']/g, function(char) {
                const map = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' };
                return map[char];
            });
        }

        function normalizeText(value) {
            return String(value || '').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '');
        }

        function getLocalToday() {
            const now = new Date();
            return toDateKey(new Date(now.getFullYear(), now.getMonth(), now.getDate()));
        }

        function buildEventDetailsModal(event) {
            const r = event.extendedProps.reservation || {};
            const isEntrega = event.extendedProps.type === 'entrega';
            const typeClass = isEntrega ? 'bg-blue-600' : 'bg-amber-500';
            const typeName = isEntrega ? 'Entrega' : 'Retorno';
            const date = event.start ? event.start.toLocaleDateString('es-CO', { weekday: 'short', day: '2-digit', month: 'short', year: 'numeric' }) : 'N/A';
            const mapsUrl = r.direccionEvento ? `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(r.direccionEvento)}` : null;
            const waPhone = r.usuarioTelefono ? r.usuarioTelefono.replace(/[^0-9+]/g, '') : '';
            const waUrl = waPhone ? `https://wa.me/${encodeURIComponent(waPhone)}?text=${encodeURIComponent(`Hola ${r.usuarioNombre || ''}, te contactamos de logística Furent respecto a tu reserva.`)}` : null;
            const items = Array.isArray(r.items) ? r.items : [];
            const itemsRows = items.length > 0
                ? items.map(i => `
                    <tr class="border-b last:border-b-0 border-surface-100">
                        <td class="px-4 py-2.5 text-xs font-bold text-surface-800">${escapeHtml(i.productoNombre || 'Producto')}</td>
                        <td class="px-4 py-2.5 text-center text-xs font-black text-surface-900">${escapeHtml(i.cantidad || 0)}</td>
                    </tr>
                `).join('')
                : `<tr><td colspan="2" class="px-4 py-5 text-center text-xs font-bold text-surface-400">Sin inventario registrado</td></tr>`;

            Swal.fire({
                title: '',
                showConfirmButton: false,
                showCloseButton: true,
                width: 760,
                padding: 0,
                customClass: {
                    popup: 'swal-logistica-popup',
                    closeButton: 'text-white/90 hover:text-white mt-2 mr-2'
                },
                html: `
                    <div class="text-left bg-white">
                        <div class="${typeClass} px-5 py-4 flex items-start justify-between gap-3">
                            <div>
                                <p class="text-[10px] font-black uppercase tracking-[0.15em] text-white/80">Operación logística</p>
                                <h3 class="text-xl font-black text-white mt-1">${typeName}</h3>
                                <p class="text-xs text-white/90 font-semibold mt-1">${escapeHtml(r.usuarioNombre || 'Cliente no identificado')}</p>
                            </div>
                            <div class="text-right">
                                <p class="text-[10px] font-black uppercase tracking-[0.15em] text-white/75">Fecha</p>
                                <p class="text-sm font-black text-white mt-1">${escapeHtml(date)}</p>
                            </div>
                        </div>

                        <div class="p-5 space-y-4">
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
                                <div class="rounded-xl border border-surface-200 p-3 bg-surface-50">
                                    <p class="text-[10px] font-black uppercase tracking-widest text-surface-500">Cliente</p>
                                    <p class="text-sm font-black text-surface-900 mt-1">${escapeHtml(r.usuarioNombre || 'Sin nombre')}</p>
                                    <p class="text-xs font-semibold text-surface-600 mt-1">${escapeHtml(r.usuarioEmail || 'Sin email')}</p>
                                    <p class="text-xs font-semibold text-surface-600">${escapeHtml(r.usuarioTelefono || 'Sin teléfono')}</p>
                                </div>
                                <div class="rounded-xl border border-surface-200 p-3 bg-surface-50">
                                    <p class="text-[10px] font-black uppercase tracking-widest text-surface-500">Reserva</p>
                                    <p class="text-xs font-black text-surface-900 mt-1">${escapeHtml(r.id || '-')}</p>
                                    <p class="text-xs font-semibold text-surface-600 mt-1">Estado: <span class="font-black">${escapeHtml(r.estado || '-')}</span></p>
                                    ${isEntrega && r.horaEntrega ? `<p class="text-xs font-semibold text-surface-600">Hora preferida: <span class="font-black">${escapeHtml(r.horaEntrega)}</span></p>` : ''}
                                </div>
                            </div>

                            <div class="rounded-xl border border-surface-200 p-3">
                                <div class="flex items-center justify-between gap-2">
                                    <p class="text-[10px] font-black uppercase tracking-widest text-surface-500">Dirección</p>
                                    ${mapsUrl ? `<a href="${mapsUrl}" target="_blank" class="text-[10px] font-black uppercase tracking-widest text-blue-700 hover:text-blue-900">Abrir mapa</a>` : ''}
                                </div>
                                <p class="text-sm font-bold text-surface-800 mt-1">${escapeHtml(r.direccionEvento || 'Dirección no disponible')}</p>
                            </div>

                            <div class="rounded-xl border border-surface-200 p-3">
                                <p class="text-[10px] font-black uppercase tracking-widest text-surface-500">Notas</p>
                                <p class="text-sm font-semibold text-surface-700 mt-1 whitespace-pre-line">${escapeHtml(r.notasEvento || 'Sin notas operativas')}</p>
                            </div>

                            <div class="rounded-xl border border-surface-200 overflow-hidden">
                                <table class="w-full">
                                    <thead class="bg-surface-50">
                                        <tr>
                                            <th class="px-4 py-2.5 text-left text-[10px] font-black uppercase tracking-widest text-surface-500">Producto</th>
                                            <th class="px-4 py-2.5 text-center text-[10px] font-black uppercase tracking-widest text-surface-500">Cant.</th>
                                        </tr>
                                    </thead>
                                    <tbody>${itemsRows}</tbody>
                                </table>
                            </div>

                            <div class="flex justify-end gap-2.5 pt-1">
                                <button type="button" onclick="Swal.close()" class="px-4 py-2 rounded-full text-[11px] font-black tracking-wide bg-white border border-surface-300 text-surface-700 hover:bg-surface-50">Cerrar</button>
                                ${waUrl ? `<a href="${waUrl}" target="_blank" class="px-4 py-2 rounded-full text-[11px] font-black tracking-wide bg-[#1fa952] text-white hover:bg-[#15803d]">WhatsApp</a>` : ''}
                            </div>
                        </div>
                    </div>
                `
            });
        }

        function getFilteredEvents(events, dateKey, filterType, searchTerm) {
            return events.filter(function(event) {
                const eventDate = event.start ? toDateKey(event.start) : '';
                if (eventDate !== dateKey) return false;
                if (filterType === 'entregas' && event.extendedProps.type !== 'entrega') return false;
                if (filterType === 'retornos' && event.extendedProps.type !== 'recogida') return false;
                if (!searchTerm) return true;
                const r = event.extendedProps.reservation || {};
                const searchText = [
                    r.usuarioNombre || '',
                    r.direccionEvento || '',
                    r.id || '',
                    r.usuarioTelefono || ''
                ].map(normalizeText).join(' ');
                return searchText.includes(searchTerm);
            });
        }

        function renderTodayOperations(events) {
            const container = document.getElementById('todayOperations');
            const dateInput = document.getElementById('logisticaDate');
            const tipoSelect = document.getElementById('logisticaTipoFiltro');
            const searchInput = document.getElementById('logisticaSearch');
            const targetDate = dateInput && dateInput.value ? dateInput.value : getLocalToday();
            const type = tipoSelect ? tipoSelect.value : 'todos';
            const search = normalizeText(searchInput ? searchInput.value : '');
            const filtered = getFilteredEvents(events, targetDate, type, search);
            const baseOfDay = events.filter(function(event) {
                return event.start && toDateKey(event.start) === targetDate;
            });
            const entregas = baseOfDay.filter(function(event) { return event.extendedProps.type === 'entrega'; }).length;
            const retornos = baseOfDay.filter(function(event) { return event.extendedProps.type === 'recogida'; }).length;
            const total = baseOfDay.length;

            document.getElementById('entregasHoyCount').textContent = entregas;
            document.getElementById('retornosHoyCount').textContent = retornos;
            document.getElementById('totalHoyCount').textContent = total;

            if (!container) return;

            if (filtered.length === 0) {
                container.innerHTML = `
                    <div class="text-center py-12">
                        <svg class="w-9 h-9 text-surface-300 mx-auto mb-3" fill="none" stroke="currentColor" stroke-width="1.7" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M8.25 6.75h7.5m-7.5 4.5h7.5m-10.5 9h13.5A2.25 2.25 0 0021 18V6a2.25 2.25 0 00-2.25-2.25H5.25A2.25 2.25 0 003 6v12A2.25 2.25 0 005.25 20.25z"/></svg>
                        <p class="text-[11px] font-black uppercase tracking-widest text-surface-500">Sin operaciones para este filtro</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = '';
            filtered.forEach(function(event) {
                const r = event.extendedProps.reservation || {};
                const isEntrega = event.extendedProps.type === 'entrega';
                const colorBlock = isEntrega ? 'bg-blue-600' : 'bg-amber-500';
                const typeText = isEntrega ? 'Entrega' : 'Retorno';
                const typeStyle = isEntrega ? 'text-blue-700 bg-blue-50 border-blue-200' : 'text-amber-700 bg-amber-50 border-amber-200';
                const dateText = event.start ? event.start.toLocaleDateString('es-CO', { weekday: 'short', day: '2-digit', month: 'short' }) : '';
                const timeBadge = isEntrega && r.horaEntrega
                    ? `<span class="inline-flex items-center rounded-full bg-surface-100 px-2 py-1 text-[10px] font-black text-surface-600">${escapeHtml(r.horaEntrega)}</span>`
                    : '';

                const card = `
                    <button type="button" onclick="openEventDetails('${escapeHtml(event.id)}')" class="w-full text-left rounded-2xl border border-surface-200 bg-white p-3 hover:shadow-md hover:border-surface-300 transition-all">
                        <div class="flex items-start gap-3">
                            <span class="w-1.5 self-stretch rounded-full ${colorBlock}"></span>
                            <div class="min-w-0 flex-1">
                                <div class="flex items-center justify-between gap-2">
                                    <span class="inline-flex items-center rounded-full border px-2 py-1 text-[10px] font-black uppercase tracking-widest ${typeStyle}">${typeText}</span>
                                    <span class="text-[10px] font-black uppercase tracking-widest text-surface-400">${escapeHtml(dateText)}</span>
                                </div>
                                <h3 class="text-sm font-black text-surface-900 truncate mt-2">${escapeHtml(r.usuarioNombre || 'Cliente')}</h3>
                                <p class="text-xs font-semibold text-surface-500 truncate mt-1" title="${escapeHtml(r.direccionEvento || '')}">${escapeHtml(r.direccionEvento || 'Dirección pendiente')}</p>
                                <div class="flex items-center justify-between mt-2">
                                    <p class="text-[10px] font-black uppercase tracking-widest text-surface-400">${escapeHtml(r.id || '-')}</p>
                                    ${timeBadge}
                                </div>
                            </div>
                        </div>
                    </button>
                `;
                container.insertAdjacentHTML('beforeend', card);
            });
        }

        function toggleView(viewType) {
            if (!calendar) return;
            const btnList = document.getElementById('viewList');
            const btnCal = document.getElementById('viewCal');

            if (viewType === 'list') {
                calendar.changeView('listMonth');
                btnList.classList.add('bg-white', 'text-surface-900', 'border', 'border-surface-200');
                btnList.classList.remove('text-surface-600');
                btnCal.classList.remove('bg-white', 'text-surface-900', 'border', 'border-surface-200');
                btnCal.classList.add('text-surface-600');
            } else {
                calendar.changeView('dayGridMonth');
                btnCal.classList.add('bg-white', 'text-surface-900', 'border', 'border-surface-200');
                btnCal.classList.remove('text-surface-600');
                btnList.classList.remove('bg-white', 'text-surface-900', 'border', 'border-surface-200');
                btnList.classList.add('text-surface-600');
            }
        }

        function openEventDetails(eventId) {
            if (!calendar) return;
            const event = calendar.getEventById(eventId);
            if (!event) {
                Swal.fire({
                    icon: 'warning',
                    title: 'Operación no encontrada',
                    text: 'No fue posible cargar el detalle de la operación seleccionada.',
                    customClass: { popup: 'swal-logistica-plain' }
                });
                return;
            }
            buildEventDetailsModal(event);
        }

        function refreshToday(btn) {
            if (btn) btn.classList.add('animate-spin');
            setTimeout(function() {
                renderTodayOperations(allCalendarEvents);
                if (btn) btn.classList.remove('animate-spin');
            }, 280);
        }

        function generateRouteSheet() {
            Swal.fire({
                title: 'Exportar hoja de ruta',
                text: 'Selecciona la fecha operativa',
                input: 'date',
                inputValue: getLocalToday(),
                showCancelButton: true,
                confirmButtonText: 'Exportar PDF',
                cancelButtonText: 'Cancelar',
                confirmButtonColor: '#18181b',
                customClass: {
                    popup: 'swal-logistica-plain',
                    confirmButton: 'rounded-full font-black text-xs px-5 py-2.5',
                    cancelButton: 'rounded-full font-black text-xs px-5 py-2.5'
                },
                inputValidator: function(value) {
                    if (!value) return 'Debes seleccionar una fecha válida';
                    return null;
                }
            }).then(function(result) {
                if (result.isConfirmed && result.value) {
                    window.location.href = '/admin/logistica/hoja-ruta?fecha=' + encodeURIComponent(result.value);
                }
            });
        }

        document.addEventListener('DOMContentLoaded', function() {
            const reservas = /*[[${reservas}]]*/ [];
            const calendarEl = document.getElementById('calendar');
            const dateInput = document.getElementById('logisticaDate');
            const typeInput = document.getElementById('logisticaTipoFiltro');
            const searchInput = document.getElementById('logisticaSearch');

            if (!Array.isArray(reservas) || !calendarEl) {
                Swal.fire({
                    icon: 'error',
                    title: 'No se pudo cargar logística',
                    text: 'Faltan datos para renderizar el calendario de operaciones.',
                    customClass: { popup: 'swal-logistica-plain' }
                });
                return;
            }

            const events = [];
            reservas.forEach(function(r) {
                const title = r && r.usuarioNombre ? r.usuarioNombre : 'Reserva';
                if (r && r.fechaInicio) {
                    events.push({
                        id: `${r.id || Math.random().toString(36).slice(2)}_delivery`,
                        title: title,
                        start: r.fechaInicio,
                        backgroundColor: '#2563eb',
                        textColor: '#ffffff',
                        extendedProps: { type: 'entrega', reservation: r }
                    });
                }
                if (r && r.fechaFin) {
                    events.push({
                        id: `${r.id || Math.random().toString(36).slice(2)}_return`,
                        title: title,
                        start: r.fechaFin,
                        backgroundColor: '#f59e0b',
                        textColor: '#ffffff',
                        extendedProps: { type: 'recogida', reservation: r }
                    });
                }
            });

            calendar = new FullCalendar.Calendar(calendarEl, {
                initialView: 'dayGridMonth',
                locale: 'es',
                height: '100%',
                contentHeight: 'auto',
                headerToolbar: { left: 'title', center: '', right: 'prev,today,next' },
                buttonText: { today: 'Hoy' },
                events: events,
                dayMaxEvents: 3,
                moreLinkContent: function(args) {
                    return '+' + args.num + ' más';
                },
                eventContent: function(arg) {
                    return { html: `<div class="truncate px-1">${escapeHtml(arg.event.title)}</div>` };
                },
                eventDidMount: function(info) {
                    const type = info.event.extendedProps.type === 'entrega' ? 'Entrega' : 'Retorno';
                    info.el.setAttribute('title', `${type}: ${info.event.title}`);
                },
                eventClick: function(info) {
                    buildEventDetailsModal(info.event);
                }
            });
            calendar.render();
            allCalendarEvents = calendar.getEvents();

            if (dateInput) dateInput.value = getLocalToday();
            if (dateInput) dateInput.addEventListener('change', function() { renderTodayOperations(allCalendarEvents); });
            if (typeInput) typeInput.addEventListener('change', function() { renderTodayOperations(allCalendarEvents); });
            if (searchInput) searchInput.addEventListener('input', function() { renderTodayOperations(allCalendarEvents); });

            renderTodayOperations(allCalendarEvents);
        });
    </script>
</main>
</body>
</html>
