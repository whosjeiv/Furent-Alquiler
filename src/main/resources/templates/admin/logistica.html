<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{fragments/admin-layout :: layout(~{::title}, ~{::main}, 'logistica')}">
<head>
    <title>Logística — Furent Admin</title>
</head>
<body>
    <main>
        <div class="px-6 sm:px-10 py-8 max-w-[90rem] mx-auto relative fade-in-up">
            <!-- Dashboard Header -->
            <div class="flex flex-col md:flex-row items-center justify-between gap-4 mb-8">
                <div>
                    <h1 class="text-3xl font-extrabold text-surface-900 tracking-tight">Logística y Entregas</h1>
                    <p class="text-sm text-surface-500 font-medium mt-1">Gestión avanzada de calendario y rutas de transporte</p>
                </div>
                <div class="flex items-center gap-3 w-full md:w-auto">
                    <div class="hidden md:flex bg-surface-100 p-1.5 rounded-xl gap-1 shadow-inner mr-2 border border-surface-200/60">
                         <button id="viewList" onclick="toggleView('list')" class="px-3 py-1.5 text-xs font-bold rounded-lg text-surface-500 hover:text-surface-900 hover:bg-white/50 transition-all focus:outline-none flex gap-1.5 items-center">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5" /></svg>
                            Lista
                        </button>
                        <button id="viewCal" onclick="toggleView('cal')" class="bg-white text-surface-900 shadow-sm px-3 py-1.5 text-xs font-bold rounded-lg transition-all focus:outline-none flex gap-1.5 items-center">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M6.75 3v2.25M17.25 3v2.25M3 18.75V7.5a2.25 2.25 0 012.25-2.25h13.5A2.25 2.25 0 0121 7.5v11.25m-18 0A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75m-18 0v-7.5A2.25 2.25 0 015.25 9h13.5A2.25 2.25 0 0121 11.25v7.5" /></svg>
                            Mes
                        </button>
                    </div>
                
                    <button onclick="window.print()" class="px-4 py-2 border border-surface-200 text-surface-700 bg-white rounded-xl font-bold text-sm hover:bg-surface-50 transition-all shadow-sm flex items-center gap-2">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M6.72 13.821l.823-7.408a2.25 2.25 0 012.24-2.003h4.435a2.25 2.25 0 012.24 2.003l.823 7.408m-12.156 0h12.156m-12.156 0a2.25 2.25 0 00-2.25 2.25v.441c0 .194.013.388.04.58l1.01 7.203a2.25 2.25 0 002.24 1.936h10.83a2.25 2.25 0 002.24-1.936l1.01-7.203a2.25 2.25 0 00.04-.58v-.441a2.25 2.25 0 00-2.25-2.25m-12.156 0h12.156" /></svg>
                        Imprimir
                    </button>
                    <button type="button" onclick="generateRouteSheet()" class="px-5 py-2 bg-furent-600 border border-furent-600 text-white rounded-xl font-bold text-sm hover:bg-furent-700 transition-all shadow-md shadow-furent-600/20 flex items-center gap-2">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 00-3.375-3.375h-1.5A1.125 1.125 0 0113.5 7.125v-1.5a3.375 3.375 0 00-3.375-3.375H8.25m0 12.75h7.5m-7.5 3H12M10.5 2.25H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 00-9-9z"></path></svg>
                        Hoja de Ruta (PDF)
                    </button>
                </div>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-4 gap-6">
                
                <!-- Left Column: Operations & Today's List (Compact) -->
                <div class="lg:col-span-1 space-y-6 flex flex-col h-full">
                    
                    <!-- Stat Cards -->
                    <div class="grid grid-cols-2 lg:grid-cols-1 xl:grid-cols-2 gap-4 shrink-0">
                        <div class="bg-blue-50/50 p-4 rounded-[1rem] border border-blue-200/60 shadow-sm flex items-center gap-3 relative overflow-hidden group">
                            <div class="absolute -right-4 -bottom-4 w-16 h-16 bg-blue-200/40 rounded-full blur-xl group-hover:scale-150 transition-all duration-700"></div>
                            <div class="w-10 h-10 rounded-xl bg-blue-100 flex items-center justify-center text-blue-600 shrink-0 border border-blue-200/50">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M8.25 18.75a1.5 1.5 0 01-3 0m3 0a1.5 1.5 0 00-3 0m3 0h6m-9 0H3.375a1.125 1.125 0 01-1.125-1.125V14.25m17.25 4.5a1.5 1.5 0 01-3 0m3 0a1.5 1.5 0 00-3 0m3 0h1.125c.621 0 1.129-.504 1.09-1.124a17.902 17.902 0 00-3.213-9.193 2.056 2.056 0 00-1.58-.86H14.25M16.5 18.75h-2.25m0-11.177v-.958c0-.568-.422-1.048-.987-1.106a48.554 48.554 0 00-10.026 0 1.106 1.106 0 00-.987 1.106v7.635m12-6.677v6.677m0 4.5v-4.5m0 0h-12" /></svg>
                            </div>
                            <div class="relative z-10 w-full">
                                <p class="text-[9px] font-bold text-blue-600/80 uppercase tracking-widest mb-0.5">Entregas</p>
                                <div class="flex items-baseline justify-between w-full">
                                    <h3 class="text-xl font-black text-blue-900 leading-none" id="entregasHoyCount">0</h3>
                                    <span class="text-[9px] font-bold text-blue-500 uppercase">Hoy</span>
                                </div>
                            </div>
                        </div>
                        
                        <div class="bg-amber-50/50 p-4 rounded-[1rem] border border-amber-200/60 shadow-sm flex items-center gap-3 relative overflow-hidden group">
                            <div class="absolute -right-4 -bottom-4 w-16 h-16 bg-amber-200/40 rounded-full blur-xl group-hover:scale-150 transition-all duration-700"></div>
                            <div class="w-10 h-10 rounded-xl bg-amber-100 flex items-center justify-center text-amber-600 shrink-0 border border-amber-200/50">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993 0l3.181 3.183a8.25 8.25 0 0013.803-3.7M4.031 9.865a8.25 8.25 0 0113.803-3.7l3.181 3.182m0-4.991v4.99" /></svg>
                            </div>
                            <div class="relative z-10 w-full">
                                <p class="text-[9px] font-bold text-amber-600/80 uppercase tracking-widest mb-0.5">Retornos</p>
                                <div class="flex items-baseline justify-between w-full">
                                    <h3 class="text-xl font-black text-amber-900 leading-none" id="retornosHoyCount">0</h3>
                                    <span class="text-[9px] font-bold text-amber-500 uppercase">Hoy</span>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Today's List -->
                    <div class="bg-white rounded-[1.5rem] px-6 py-6 lg:px-7 lg:py-7 shadow-sm border border-surface-200 flex flex-col flex-1 h-[620px] overflow-hidden">
                        <div class="flex items-center justify-between mb-5 border-b border-surface-100 pb-4 gap-3 flex-wrap">
                            <h2 class="text-base font-extrabold text-surface-900 tracking-tight flex items-center gap-2">
                                <svg class="w-4 h-4 text-furent-500" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 6v6h4.5m4.5 0a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
                                Agenda logística
                            </h2>
                            <div class="flex items-center gap-2 text-[11px] font-semibold text-surface-500 flex-1 sm:flex-none justify-end">
                                <input id="logisticaDate" type="date"
                                       class="border border-surface-200 rounded-lg px-2 py-1 bg-white text-xs focus:ring-2 focus:ring-furent-500/20 focus:border-furent-500 h-8"
                                       />
                                <select id="logisticaTipoFiltro"
                                        class="border border-surface-200 rounded-lg px-2 py-1 bg-white text-xs focus:ring-2 focus:ring-furent-500/20 focus:border-furent-500 h-8">
                                    <option value="todos">Entregas y retornos</option>
                                    <option value="entregas">Solo entregas</option>
                                    <option value="retornos">Solo retornos</option>
                                </select>
                                <!-- Botón refresh icono solo al extremo derecho -->
                                <button onclick="refreshToday(this)" class="w-8 h-8 flex items-center justify-center text-furent-500 hover:text-furent-600 transition-colors" title="Actualizar listado">
                                    <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993 0l3.181 3.183a8.25 8.25 0 0013.803-3.7M4.031 9.865a8.25 8.25 0 0113.803-3.7l3.181 3.182m0-4.991v4.99"/></svg>
                                </button>
                            </div>
                        </div>
                        
                        <!-- List Container -->
                        <div class="flex-1 overflow-y-auto space-y-3 custom-scrollbar pr-2" id="todayOperations">
                            <!-- Populated by JS -->
                            <div class="text-center py-8">
                                <div class="w-8 h-8 rounded-full border-2 border-furent-200 border-t-furent-600 animate-spin mx-auto mb-3"></div>
                                <p class="text-xs font-semibold text-surface-400 uppercase tracking-widest">Cargando...</p>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Right Column: Calendar -->
                <div class="lg:col-span-3 space-y-6">
                    <div class="bg-white rounded-[1.5rem] p-6 lg:p-8 shadow-sm border border-surface-200 relative overflow-hidden h-full min-h-[600px]">
                        <!-- Soft decorative shape -->
                        <div class="absolute top-0 right-0 w-64 h-64 bg-furent-300/10 rounded-full blur-[80px] pointer-events-none -z-0"></div>
                        
                        <div class="flex items-center justify-between mb-6 relative z-10 border-b border-surface-100 pb-4">
                            <h2 class="text-lg font-extrabold text-surface-900 tracking-tight flex items-center gap-2">
                                <svg class="w-5 h-5 text-furent-500" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M6.75 3v2.25M17.25 3v2.25M3 18.75V7.5a2.25 2.25 0 012.25-2.25h13.5A2.25 2.25 0 0121 7.5v11.25m-18 0A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75m-18 0v-7.5A2.25 2.25 0 015.25 9h13.5A2.25 2.25 0 0121 11.25v7.5" /></svg>
                                Visor Programático
                            </h2>
                            <div class="flex items-center gap-4 text-xs font-bold text-surface-400 capitalize bg-surface-50 px-3 py-1.5 rounded-lg border border-surface-100">
                                <div class="flex items-center gap-1.5"><span class="w-2.5 h-2.5 bg-blue-500 rounded-[3px]"></span> Envío</div>
                                <div class="flex items-center gap-1.5"><span class="w-2.5 h-2.5 bg-amber-500 rounded-[3px]"></span> Retorno</div>
                            </div>
                        </div>
                        
                        <!-- FullCalendar Container -->
                        <div id="calendar" class="relative z-10 custom-calendar font-sans"></div>
                    </div>
                </div>

            </div>
        </div>

        <!-- FullCalendar & Dependencies -->
        <link href='https://cdn.jsdelivr.net/npm/fullcalendar@5.11.3/main.min.css' rel='stylesheet' />
        <script src='https://cdn.jsdelivr.net/npm/fullcalendar@5.11.3/main.min.js'></script>
        <script src="https://cdn.jsdelivr.net/npm/fullcalendar@5.11.3/locales/es.js"></script>

        <style>
            /* Custom Scrollbar */
            .custom-scrollbar::-webkit-scrollbar { width: 4px; }
            .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
            .custom-scrollbar::-webkit-scrollbar-thumb { background: #e4e4e7; border-radius: 4px; }
            .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #d4d4d8; }

            /* Compact Calendar Customization */
            .custom-calendar { font-family: 'Outfit', sans-serif !important; border: none !important; }
            .custom-calendar .fc-toolbar-title { font-size: 1.125rem !important; font-weight: 800 !important; color: #18181b; letter-spacing: -0.02em; }
            .custom-calendar .fc-button-primary { background: #f4f4f5 !important; color: #3f3f46 !important; border: 1px solid #e4e4e7 !important; border-radius: 0.5rem !important; font-weight: 700 !important; text-transform: capitalize !important; padding: 0.25rem 0.75rem !important; font-size: 0.75rem !important; box-shadow: 0 1px 2px 0 rgb(0 0 0 / 0.05) !important; transition: all 0.2s; }
            .custom-calendar .fc-button-primary:hover { background: #e4e4e7 !important; color: #18181b !important; }
            .custom-calendar .fc-button-active { background: #18181b !important; color: #fff !important; border-color: #18181b !important; }
            .custom-calendar .fc-icon { font-size: 0.875rem !important; }
            .custom-calendar .fc-daygrid-day { border-color: #f4f4f5 !important; }
            .custom-calendar .fc-daygrid-day-top { flex-direction: row; justify-content: flex-end; padding: 4px 6px; }
            .custom-calendar .fc-daygrid-day-number { font-size: 0.75rem; font-weight: 700; color: #52525b; padding: 2px 6px; border-radius: 4px; }
            .custom-calendar .fc-col-header-cell { padding: 0.75rem 0 !important; background: #fafafa; border-color: #f4f4f5 !important; border-top: none !important; border-right: none !important; border-left: none !important;}
            .custom-calendar .fc-col-header-cell-cushion { font-size: 0.65rem !important; font-weight: 800 !important; color: #71717a !important; text-transform: uppercase !important; letter-spacing: 0.05em; }
            
            .custom-calendar .fc-event { border: none !important; margin: 1px 4px !important; padding: 2px 6px !important; border-radius: 4px !important; font-size: 0.65rem !important; font-weight: 700 !important; box-shadow: 0 1px 2px rgb(0 0 0 / 5%) !important; cursor: pointer; transition: transform 0.1s;}
            .custom-calendar .fc-event:hover { transform: translateY(-1px); }
            .custom-calendar .fc-day-today { background: #fafafa !important; }
            .custom-calendar .fc-day-today .fc-daygrid-day-number { background: #18181b; color: #fff; }

            .custom-calendar .fc-scroller { overflow-y: hidden !important; } /* Fix tall scrollbars in compact mode */
        </style>

        <script th:inline="javascript">
            let calendar;
            let allCalendarEvents = [];

            document.addEventListener('DOMContentLoaded', function() {
                const reservas = /*[[${reservas}]]*/ [];
                const calendarEl = document.getElementById('calendar');
                
                const events = [];
                reservas.forEach(r => {
                    // Delivery Event
                    if (r.fechaInicio) {
                        events.push({
                            id: r.id + '_delivery',
                            title: r.usuarioNombre,
                            start: r.fechaInicio,
                            backgroundColor: '#3b82f6',
                            borderColor: '#2563eb', // used to determine icon in view
                            extendedProps: { type: 'entrega', reservation: r }
                        });
                    }
                    // Collection Event
                    if (r.fechaFin) {
                        events.push({
                            id: r.id + '_return',
                            title: r.usuarioNombre,
                            start: r.fechaFin,
                            backgroundColor: '#f59e0b',
                            borderColor: '#d97706',
                            extendedProps: { type: 'recogida', reservation: r }
                        });
                    }
                });

                calendar = new FullCalendar.Calendar(calendarEl, {
                    initialView: 'dayGridMonth',
                    locale: 'es',
                    height: 600,
                    contentHeight: 520, /* Compact */
                    headerToolbar: {
                        left: 'prev,next today',
                        center: 'title',
                        right: '' // Handled by custom external buttons now (simulated)
                    },
                    events: events,
                    dayMaxEvents: 3, // limit events per day for compactness
                    moreLinkContent:function(args){
                        return '+' + args.num + ' más';
                    },
                    eventContent: function(arg) {
                        let isDelivery = arg.event.extendedProps.type === 'entrega';
                        let iconHtml = isDelivery 
                            ? `<svg class="w-3 h-3 inline-block mr-1 opacity-80" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M8.25 18.75a1.5 1.5 0 01-3 0m3 0a1.5 1.5 0 00-3 0m3 0h6m-9 0H3.375a1.125 1.125 0 01-1.125-1.125V14.25m17.25 4.5a1.5 1.5 0 01-3 0m3 0a1.5 1.5 0 00-3 0m3 0h1.125c.621 0 1.129-.504 1.09-1.124a17.902 17.902 0 00-3.213-9.193 2.056 2.056 0 00-1.58-.86H14.25M16.5 18.75h-2.25m0-11.177v-.958c0-.568-.422-1.048-.987-1.106a48.554 48.554 0 00-10.026 0 1.106 1.106 0 00-.987 1.106v7.635m12-6.677v6.677m0 4.5v-4.5m0 0h-12" /></svg>` 
                            : `<svg class="w-3 h-3 inline-block mr-1 opacity-80" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993 0l3.181 3.183a8.25 8.25 0 0013.803-3.7M4.031 9.865a8.25 8.25 0 0113.803-3.7l3.181 3.182m0-4.991v4.99" /></svg>`;
                        
                        return { html: `<div class="truncate flex items-center w-full px-0.5">${iconHtml}<span>${arg.event.title}</span></div>` };
                    },
                    eventClick: function(info) {
                        const r = info.event.extendedProps.reservation;
                        const mapsUrl = r.direccionEvento ? 'https://www.google.com/maps/search/?api=1&query=' + encodeURIComponent(r.direccionEvento) : null;
                        const waUrl = r.usuarioTelefono ? 'https://wa.me/' + encodeURIComponent(r.usuarioTelefono.replace(/[^0-9+]/g, '')) + '?text=' + encodeURIComponent('Hola ' + (r.usuarioNombre || '') + ', te contactamos de Furent sobre tu entrega/retorno de mobiliario.') : null;
                        const typeFormat = info.event.extendedProps.type === 'entrega' 
                            ? '<span class="px-2 py-0.5 rounded text-[10px] bg-blue-100 text-blue-700 font-extrabold uppercase tracking-widest border border-blue-200">Entrega</span>' 
                            : '<span class="px-2 py-0.5 rounded text-[10px] bg-amber-100 text-amber-700 font-extrabold uppercase tracking-widest border border-amber-200">Recogida</span>';

                        let clientInitials = r.usuarioNombre ? r.usuarioNombre.substring(0,2).toUpperCase() : 'C';

                        Swal.fire({
                            title: '',
                            html: `
                                <div class="text-left">
                                    <div class="flex items-center gap-3 mb-6">
                                        <div class="w-10 h-10 rounded-xl bg-surface-100 flex items-center justify-center font-bold text-surface-900 border border-surface-200 shadow-sm">
                                            ${clientInitials}
                                        </div>
                                        <div>
                                            <h3 class="text-base font-extrabold text-surface-900 leading-none mb-1">${r.usuarioNombre}</h3>
                                            <div class="flex items-center gap-2">
                                                ${typeFormat}
                                                <span class="text-[10px] font-bold text-surface-400 capitalize bg-surface-50 px-2 py-0.5 rounded border border-surface-200">${info.event.start.toLocaleDateString()}</span>
                                                ${info.event.extendedProps.type === 'entrega' && r.horaEntrega ? `<span class="text-[10px] font-bold text-blue-600 capitalize bg-blue-50 px-2 py-0.5 rounded border border-blue-200"><svg class="w-3 h-3 inline pb-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg> ${r.horaEntrega}</span>` : ''}
                                            </div>
                                        </div>
                                    </div>
                                    
                                    <div class="space-y-3 mb-4">
                                        <!-- Datos del evento -->
                                        <div class="grid grid-cols-2 gap-2">
                                            <div class="bg-surface-50 p-2.5 rounded-xl border border-surface-200">
                                                <h4 class="text-[9px] font-bold uppercase tracking-widest text-surface-500 mb-0.5">Días alquiler</h4>
                                                <p class="text-sm font-extrabold text-surface-900">${r.diasAlquiler || '—'} días</p>
                                            </div>
                                            <div class="bg-surface-50 p-2.5 rounded-xl border border-surface-200">
                                                <h4 class="text-[9px] font-bold uppercase tracking-widest text-surface-500 mb-0.5">Tipo evento</h4>
                                                <p class="text-sm font-extrabold text-surface-900">${r.tipoEvento || '—'}</p>
                                            </div>
                                        </div>

                                        <div class="grid grid-cols-2 gap-2">
                                            <div class="bg-surface-50 p-2.5 rounded-xl border border-surface-200">
                                                <h4 class="text-[9px] font-bold uppercase tracking-widest text-surface-500 mb-0.5">Total</h4>
                                                <p class="text-sm font-extrabold text-furent-600">$${r.total ? Number(r.total).toLocaleString('es-CO') : '0'}</p>
                                            </div>
                                            <div class="bg-surface-50 p-2.5 rounded-xl border border-surface-200">
                                                <h4 class="text-[9px] font-bold uppercase tracking-widest text-surface-500 mb-0.5">Método pago</h4>
                                                <p class="text-xs font-bold text-surface-900">${r.metodoPago || '—'}</p>
                                            </div>
                                        </div>

                                        <!-- Teléfono del cliente -->
                                        <div class="bg-surface-50 p-3 rounded-xl border border-surface-200 shadow-inner">
                                            <h4 class="text-[9px] font-bold uppercase tracking-widest text-surface-500 mb-1 flex items-center gap-1.5"><svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M2.25 6.75c0 8.284 6.716 15 15 15h2.25a2.25 2.25 0 002.25-2.25v-1.372c0-.516-.351-.966-.852-1.091l-4.423-1.106c-.44-.11-.902.055-1.173.417l-.97 1.293c-.282.376-.769.542-1.21.38a12.035 12.035 0 01-7.143-7.143c-.162-.441.004-.928.38-1.21l1.293-.97c.363-.271.527-.734.417-1.173L6.963 3.102a1.125 1.125 0 00-1.091-.852H4.5A2.25 2.25 0 002.25 4.5v2.25z" /></svg> Contacto</h4>
                                            <p class="text-xs font-semibold text-surface-900">${r.usuarioTelefono || r.usuarioEmail || 'Sin contacto'}</p>
                                        </div>

                                        <div class="bg-surface-50 p-3 rounded-xl border border-surface-200 shadow-inner">
                                            <h4 class="text-[9px] font-bold uppercase tracking-widest text-surface-500 mb-1 flex items-center gap-1.5"><svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M15 10.5a3 3 0 11-6 0 3 3 0 016 0z" /><path stroke-linecap="round" stroke-linejoin="round" d="M19.5 10.5c0 7.142-7.5 11.25-7.5 11.25S4.5 17.642 4.5 10.5a7.5 7.5 0 1115 0z" /></svg> Ubicación</h4>
                                            <p class="text-xs font-semibold text-surface-900 truncate">${r.direccionEvento || 'Dirección no especificada'}</p>
                                            ${mapsUrl ? `<div class="mt-2"><a href="${mapsUrl}" target="_blank" class="inline-flex items-center gap-1 text-[10px] font-bold text-furent-600 hover:text-furent-700">Ver en Google Maps<svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M13.5 4.5H19.5V10.5M19.5 4.5L10.5 13.5M15.75 19.5H4.5V8.25"/></svg></a></div>` : ''}
                                        </div>

                                        <!-- Notas del evento -->
                                        ${r.notasEvento ? `<div class="bg-amber-50/50 p-3 rounded-xl border border-amber-200/50">
                                            <h4 class="text-[9px] font-bold uppercase tracking-widest text-amber-600 mb-1 flex items-center gap-1.5"><svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m9-.75a9 9 0 11-18 0 9 9 0 0118 0zm-9 3.75h.008v.008H12v-.008z"/></svg> Notas</h4>
                                            <p class="text-xs font-medium text-amber-800 whitespace-pre-line">${r.notasEvento}</p>
                                        </div>` : ''}
                                        
                                        <div class="bg-surface-50 p-3 rounded-xl border border-surface-200 shadow-inner max-h-[120px] overflow-y-auto custom-scrollbar">
                                            <h4 class="text-[9px] font-bold uppercase tracking-widest text-surface-500 mb-2 flex items-center gap-1.5"><svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M20.25 7.5l-.625 10.632a2.25 2.25 0 01-2.247 2.118H6.622a2.25 2.25 0 01-2.247-2.118L3.75 7.5M12 13.875l2.25-2.25M12 13.875l-2.25 2.25M3.375 7.5h17.25c.621 0 1.125-.504 1.125-1.125v-1.5c0-.621-.504-1.125-1.125-1.125H3.375c-.621 0-1.125.504-1.125 1.125v1.5c0 .621.504 1.125 1.125 1.125z" /></svg> Inventario Movilizado</h4>
                                            <ul class="space-y-1.5">
                                                ${r.items ? r.items.map(i => `<li class="text-[11px] font-medium text-surface-700 flex justify-between items-center"><span class="truncate pr-2">${i.productoNombre}</span> <span class="bg-surface-200 px-1.5 py-0.5 rounded text-surface-600 font-bold">x${i.cantidad}</span></li>`).join('') : '<li class="text-xs text-surface-400">Sin items</li>'}
                                            </ul>
                                        </div>
                                        ${(waUrl) ? `<div class="mt-3 flex justify-end">
                                            <a href="${waUrl}" target="_blank" class="inline-flex items-center gap-1 text-[11px] font-bold text-green-600 bg-green-50 border border-green-200 rounded-lg px-3 py-1 hover:bg-green-100">
                                                <svg class="w-3 h-3" fill="currentColor" viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-4.721 7.454c-1.332 0-2.615-.359-3.729-1.038l-.268-.159-2.774.727.741-2.711-.174-.275A9.74 9.74 0 013.058 12.3c0-5.385 4.381-9.766 9.771-9.766 2.61 0 5.064 1.017 6.911 2.863 1.848 1.846 2.865 4.3 2.865 6.903 0 5.386-4.381 9.767-9.77 9.767m9.77-11.838c0-5.386-4.381-9.766-9.77-9.766S3.058 4.478 3.058 9.864c0 1.721.455 3.395 1.319 4.87L3 20l5.368-1.408a9.73 9.73 0 004.872 1.288c5.4 0 9.77-4.38 9.77-9.766"/></svg>
                                                WhatsApp
                                            </a>
                                        </div>` : ''}
                                    </div>
                                </div>
                            `,
                            showCloseButton: true,
                            showConfirmButton: false,
                            customClass: { popup: 'rounded-2xl', htmlContainer: 'm-0', closeButton: 'text-surface-400 focus:outline-none' }
                        });
                    }
                });
                calendar.render();

                allCalendarEvents = calendar.getEvents();

                // Inicializar selector de fecha al día de hoy
                const dateInput = document.getElementById('logisticaDate');
                if (dateInput) {
                    dateInput.value = new Date().toISOString().split('T')[0];
                    dateInput.addEventListener('change', () => updateTodayList(allCalendarEvents));
                }
                const tipoSelect = document.getElementById('logisticaTipoFiltro');
                if (tipoSelect) {
                    tipoSelect.addEventListener('change', () => updateTodayList(allCalendarEvents));
                }

                // Construir lista inicial
                updateTodayList(allCalendarEvents);
            });

            function updateTodayList(allEvents) {
                const dateInput = document.getElementById('logisticaDate');
                const filtroTipo = document.getElementById('logisticaTipoFiltro');
                const targetDate = dateInput && dateInput.value ? dateInput.value : new Date().toISOString().split('T')[0];
                const tipo = filtroTipo ? filtroTipo.value : 'todos';

                const todayOps = allEvents.filter(e => {
                    const eventDate = e.start.toISOString().split('T')[0];
                    if (eventDate !== targetDate) return false;
                    if (tipo === 'entregas') return e.extendedProps.type === 'entrega';
                    if (tipo === 'retornos') return e.extendedProps.type === 'recogida';
                    return true;
                });
                const container = document.getElementById('todayOperations');
                
                let entregas = 0;
                let retornos = 0;
                
                if (todayOps.length === 0) {
                    container.innerHTML = `
                        <div class="text-center py-10 opacity-60 bg-surface-50 rounded-xl border-2 border-dashed border-surface-200">
                            <svg class="w-8 h-8 text-surface-300 mx-auto mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M2.25 3h1.386c.51 0 .955.343 1.087.835l.383 1.437M7.5 14.25a3 3 0 00-3 3h15.75m-12.75-3h11.218c1.121-2.3 2.1-4.684 2.924-7.138a60.114 60.114 0 00-16.536-1.84M7.5 14.25L5.106 5.272M6 20.25a.75.75 0 11-1.5 0 .75.75 0 011.5 0zm12.75 0a.75.75 0 11-1.5 0 .75.75 0 011.5 0z" /></svg>
                            <p class="text-[11px] font-bold text-surface-400 uppercase tracking-widest">Sin operaciones</p>
                        </div>
                    `;
                } else {
                    container.innerHTML = '';
                    todayOps.forEach(e => {
                        if (e.extendedProps.type === 'entrega') entregas++;
                        else retornos++;
                        
                        const r = e.extendedProps.reservation;
                        const isEntrega = e.extendedProps.type === 'entrega';
                        const bgColor = isEntrega ? 'bg-blue-50/50' : 'bg-amber-50/50';
                        const hoverColor = isEntrega ? 'hover:border-blue-300' : 'hover:border-amber-300';
                        const iconColor = isEntrega ? 'text-blue-600' : 'text-amber-600';
                        const iconSvg = isEntrega 
                            ? `<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M8.25 18.75a1.5 1.5 0 01-3 0m3 0a1.5 1.5 0 00-3 0m3 0h6m-9 0H3.375a1.125 1.125 0 01-1.125-1.125V14.25m17.25 4.5a1.5 1.5 0 01-3 0m3 0a1.5 1.5 0 00-3 0m3 0h1.125c.621 0 1.129-.504 1.09-1.124a17.902 17.902 0 00-3.213-9.193 2.056 2.056 0 00-1.58-.86H14.25M16.5 18.75h-2.25m0-11.177v-.958c0-.568-.422-1.048-.987-1.106a48.554 48.554 0 00-10.026 0 1.106 1.106 0 00-.987 1.106v7.635m12-6.677v6.677m0 4.5v-4.5m0 0h-12" /></svg>`
                            : `<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993 0l3.181 3.183a8.25 8.25 0 0013.803-3.7M4.031 9.865a8.25 8.25 0 0113.803-3.7l3.181 3.182m0-4.991v4.99" /></svg>`;
                        const typeLabel = isEntrega ? 'Entrega' : 'Retorno';
                        const timeBadge = (isEntrega && r.horaEntrega) ? `<span class="px-1.5 py-[1px] ml-1 bg-blue-100 text-blue-700 rounded text-[9px] font-bold border border-blue-200 tracking-wider"><svg class="w-2.5 h-2.5 inline pb-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg> ${r.horaEntrega}</span>` : '';
                        
                        const card = `
                            <div class="${bgColor} p-3 rounded-xl border border-surface-200/60 shadow-sm flex items-start gap-3 group ${hoverColor} transition-colors cursor-pointer" onclick="openEventDetails('${e.id}')">
                                <div class="w-8 h-8 rounded-lg bg-white flex items-center justify-center ${iconColor} border border-surface-200/50 shadow-sm shrink-0 mt-0.5">
                                    ${iconSvg}
                                </div>
                                <div class="flex-1 min-w-0">
                                    <div class="flex items-center justify-between gap-2 mb-0.5">
                                        <h4 class="text-xs font-bold text-surface-900 w-full truncate flex items-center">${r.usuarioNombre} ${timeBadge}</h4>
                                        <span class="text-[9px] font-bold ${iconColor} uppercase tracking-widest shrink-0">${typeLabel}</span>
                                    </div>
                                    <p class="text-[10px] text-surface-500 font-medium truncate w-[130px]" title="${r.direccionEvento || ''}">${r.direccionEvento || 'Verificar dirección'}</p>
                                </div>
                            </div>
                        `;
                        container.insertAdjacentHTML('beforeend', card);
                    });
                }
                
                document.getElementById('entregasHoyCount').textContent = entregas;
                document.getElementById('retornosHoyCount').textContent = retornos;
            }

            function refreshToday(btn) {
                if (!btn) return;
                btn.classList.add('animate-spin');
                setTimeout(() => {
                    updateTodayList(allCalendarEvents);
                    btn.classList.remove('animate-spin');
                }, 500);
            }

            function openEventDetails(eventId) {
                const ev = calendar.getEventById(eventId);
                if(ev) calendar.trigger('eventClick', { event: ev });
            }

            function toggleView(viewType) {
                const btnList = document.getElementById('viewList');
                const btnCal = document.getElementById('viewCal');
                
                if (viewType === 'list') {
                    calendar.changeView('listMonth');
                    btnList.classList.add('bg-white', 'text-surface-900', 'shadow-sm');
                    btnList.classList.remove('text-surface-500', 'hover:bg-white/50');
                    btnCal.classList.remove('bg-white', 'text-surface-900', 'shadow-sm');
                    btnCal.classList.add('text-surface-500', 'hover:bg-white/50');
                } else {
                    calendar.changeView('dayGridMonth');
                    btnCal.classList.add('bg-white', 'text-surface-900', 'shadow-sm');
                    btnCal.classList.remove('text-surface-500', 'hover:bg-white/50');
                    btnList.classList.remove('bg-white', 'text-surface-900', 'shadow-sm');
                    btnList.classList.add('text-surface-500', 'hover:bg-white/50');
                }
            }

            function generateRouteSheet() {
                Swal.fire({
                    title: 'Ruta Diaria',
                    text: 'Generar itinerario del equipo de logística para el día:',
                    input: 'date',
                    inputValue: new Date().toISOString().split('T')[0],
                    showCancelButton: true,
                    confirmButtonText: 'Exportar PDF',
                    cancelButtonText: 'Cancelar',
                    confirmButtonColor: '#18181b', // surface-900
                    customClass: { popup: 'rounded-2xl', input: 'border-surface-200 text-sm focus:ring-furent-500 rounded-lg' }
                }).then((result) => {
                    if (result.isConfirmed && result.value) {
                        window.location.href = '/admin/logistica/hoja-ruta?fecha=' + result.value;
                    }
                });
            }
        </script>
    </main>
</body>
</html>
