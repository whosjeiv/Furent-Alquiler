<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Categorías - Admin Furent</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-50">
    <!-- Header -->
    <div th:replace="~{fragments/layout :: admin-header}"></div>

    <div class="container mx-auto px-4 py-8">
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-3xl font-bold text-gray-800">
                <i class="fas fa-tags mr-2"></i>Gestión de Categorías
            </h1>
            <button onclick="openCreateModal()" 
                    class="bg-blue-600 text-white px-6 py-2 rounded-lg hover:bg-blue-700">
                <i class="fas fa-plus mr-2"></i>Nueva Categoría
            </button>
        </div>

        <!-- Mensajes Flash -->
        <div th:if="${success}" class="bg-green-100 border border-green-400 text-green-700 px-4 py-3 rounded mb-4">
            <span th:text="${success}"></span>
        </div>
        <div th:if="${error}" class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded mb-4">
            <span th:text="${error}"></span>
        </div>

        <!-- Tabla de Categorías -->
        <div class="bg-white rounded-lg shadow-md overflow-hidden">
            <div class="p-4 bg-gray-50 border-b">
                <p class="text-sm text-gray-600">
                    Total de categorías: <span class="font-semibold" th:text="${#lists.size(categories)}">0</span>
                </p>
            </div>

            <div class="overflow-x-auto">
                <table class="w-full">
                    <thead class="bg-gray-100">
                        <tr>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Nombre</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Descripción</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Icono</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Productos</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Acciones</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-gray-200">
                        <tr th:each="category : ${categories}" class="hover:bg-gray-50">
                            <td class="px-6 py-4 text-sm font-medium text-gray-900" th:text="${category.nombre}"></td>
                            <td class="px-6 py-4 text-sm text-gray-600" th:text="${category.descripcion}"></td>
                            <td class="px-6 py-4 text-sm">
                                <i th:class="${'fas ' + category.icono + ' text-blue-600 text-xl'}"></i>
                            </td>
                            <td class="px-6 py-4">
                                <span class="px-3 py-1 text-sm font-semibold rounded-full bg-blue-100 text-blue-800">
                                    <span th:text="${category.cantidadProductos}">0</span> productos
                                </span>
                            </td>
                            <td class="px-6 py-4 text-sm">
                                <div class="flex gap-2">
                                    <!-- Botón Editar -->
                                    <button onclick="openEditModal(this)"
                                            th:data-category-id="${category.id}"
                                            th:data-category-nombre="${category.nombre}"
                                            th:data-category-descripcion="${category.descripcion}"
                                            th:data-category-icono="${category.icono}"
                                            th:data-category-slug="${category.slug}"
                                            class="text-blue-600 hover:text-blue-800" title="Editar">
                                        <i class="fas fa-edit"></i>
                                    </button>

                                    <!-- Botón Eliminar -->
                                    <button onclick="openDeleteModal(this)"
                                            th:data-category-id="${category.id}"
                                            th:data-category-nombre="${category.nombre}"
                                            th:data-category-productos="${category.cantidadProductos}"
                                            class="text-red-600 hover:text-red-800" title="Eliminar">
                                        <i class="fas fa-trash"></i>
                                    </button>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Modal Crear/Editar Categoría -->
    <div id="categoryModal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
        <div class="bg-white rounded-lg p-6 max-w-md w-full mx-4">
            <h3 id="modalTitle" class="text-xl font-bold mb-4">Nueva Categoría</h3>
            
            <form id="categoryForm" action="/admin/categorias/guardar" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <input type="hidden" id="categoryId" name="id"/>
                
                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700 mb-2">Nombre *</label>
                    <input type="text" id="categoryNombre" name="nombre" required 
                           class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500"
                           placeholder="Ej: Sillas, Mesas, Decoración..."/>
                </div>

                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700 mb-2">Descripción</label>
                    <textarea id="categoryDescripcion" name="descripcion" 
                              class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500"
                              rows="3" placeholder="Descripción de la categoría..."></textarea>
                </div>

                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700 mb-2">Icono (Font Awesome)</label>
                    <input type="text" id="categoryIcono" name="icono" 
                           class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500"
                           placeholder="Ej: fa-chair, fa-table, fa-star..."/>
                    <p class="text-xs text-gray-500 mt-1">
                        Ver iconos en <a href="https://fontawesome.com/icons" target="_blank" class="text-blue-600 hover:underline">fontawesome.com</a>
                    </p>
                </div>

                <input type="hidden" id="categorySlug" name="slug"/>

                <div class="flex gap-2 justify-end">
                    <button type="button" onclick="closeCategoryModal()" 
                            class="px-4 py-2 bg-gray-300 text-gray-700 rounded hover:bg-gray-400">
                        Cancelar
                    </button>
                    <button type="submit" class="px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700">
                        Guardar
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- Modal Eliminar Categoría -->
    <div id="deleteModal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
        <div class="bg-white rounded-lg p-6 max-w-md w-full mx-4">
            <h3 class="text-xl font-bold mb-4">Eliminar Categoría</h3>
            <p class="text-gray-600 mb-4">
                ¿Está seguro de eliminar la categoría <span id="deleteCategoria" class="font-semibold"></span>?
            </p>
            <div id="deleteWarning" class="hidden bg-yellow-100 border border-yellow-400 text-yellow-700 px-4 py-3 rounded mb-4">
                <i class="fas fa-exclamation-triangle mr-2"></i>
                <span>Esta categoría tiene <span id="deleteProductCount" class="font-semibold"></span> productos asociados y no puede ser eliminada.</span>
            </div>
            
            <form id="deleteForm" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <input type="hidden" name="_method" value="DELETE"/>
                <div class="flex gap-2 justify-end">
                    <button type="button" onclick="closeDeleteModal()" 
                            class="px-4 py-2 bg-gray-300 text-gray-700 rounded hover:bg-gray-400">
                        Cancelar
                    </button>
                    <button id="deleteButton" type="submit" class="px-4 py-2 bg-red-600 text-white rounded hover:bg-red-700">
                        Eliminar
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script>
        function openCreateModal() {
            document.getElementById('modalTitle').textContent = 'Nueva Categoría';
            document.getElementById('categoryForm').reset();
            document.getElementById('categoryId').value = '';
            document.getElementById('categoryModal').classList.remove('hidden');
        }

        function openEditModal(button) {
            const id = button.getAttribute('data-category-id');
            const nombre = button.getAttribute('data-category-nombre');
            const descripcion = button.getAttribute('data-category-descripcion');
            const icono = button.getAttribute('data-category-icono');
            const slug = button.getAttribute('data-category-slug');

            document.getElementById('modalTitle').textContent = 'Editar Categoría';
            document.getElementById('categoryId').value = id;
            document.getElementById('categoryNombre').value = nombre;
            document.getElementById('categoryDescripcion').value = descripcion || '';
            document.getElementById('categoryIcono').value = icono || '';
            document.getElementById('categorySlug').value = slug || '';
            
            document.getElementById('categoryModal').classList.remove('hidden');
        }

        function closeCategoryModal() {
            document.getElementById('categoryModal').classList.add('hidden');
        }

        function openDeleteModal(button) {
            const id = button.getAttribute('data-category-id');
            const nombre = button.getAttribute('data-category-nombre');
            const productos = parseInt(button.getAttribute('data-category-productos'));

            document.getElementById('deleteCategoria').textContent = nombre;
            document.getElementById('deleteForm').action = '/admin/categorias/' + id;

            // Mostrar advertencia si tiene productos
            if (productos > 0) {
                document.getElementById('deleteWarning').classList.remove('hidden');
                document.getElementById('deleteProductCount').textContent = productos;
                document.getElementById('deleteButton').disabled = true;
                document.getElementById('deleteButton').classList.add('opacity-50', 'cursor-not-allowed');
            } else {
                document.getElementById('deleteWarning').classList.add('hidden');
                document.getElementById('deleteButton').disabled = false;
                document.getElementById('deleteButton').classList.remove('opacity-50', 'cursor-not-allowed');
            }

            document.getElementById('deleteModal').classList.remove('hidden');
        }

        function closeDeleteModal() {
            document.getElementById('deleteModal').classList.add('hidden');
        }

        // Cerrar modales al hacer clic fuera
        window.onclick = function(event) {
            if (event.target.id === 'categoryModal') closeCategoryModal();
            if (event.target.id === 'deleteModal') closeDeleteModal();
        }
    </script>
</body>
</html>
