<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head th:replace="~{fragments/layout :: head}"></head>
<body class="bg-surface-50 font-sans text-surface-800 min-h-screen flex flex-col">

    <div th:replace="~{fragments/layout :: nav}"></div>

    <main class="flex-1 pt-[68px]">

        <!-- Header -->
        <div class="bg-white border-b border-surface-100">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-12">
                <div class="max-w-2xl fade-in-up">
                    <h1 class="text-3xl md:text-4xl font-bold text-surface-900 tracking-tight mb-3">Contáctanos</h1>
                    <p class="text-surface-500 leading-relaxed">¿Tienes alguna pregunta o deseas una cotización? Estamos aquí para ayudarte.</p>
                </div>
            </div>
        </div>

        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-12">
            <div class="grid grid-cols-1 lg:grid-cols-5 gap-12">

                <!-- Contact form -->
                <div class="lg:col-span-3 fade-in-up">
                    <div class="bg-white rounded-2xl p-8 shadow-soft border border-surface-100">
                        <h2 class="text-xl font-semibold text-surface-900 mb-6">Envíanos un mensaje</h2>
                        
                        <!-- Flash messages -->
                        <div th:if="${success}" class="mb-4 p-4 bg-green-50 border border-green-200 rounded-xl text-green-700 text-sm font-medium">
                            <span th:text="${success}">Mensaje enviado</span>
                        </div>
                        
                        <form th:action="@{/contacto}" method="post" class="space-y-5">
                            <div class="grid grid-cols-1 sm:grid-cols-2 gap-5">
                                <div>
                                    <label class="block text-xs font-medium text-surface-600 uppercase tracking-wider mb-2">Nombre</label>
                                    <input type="text" name="nombre" required placeholder="Tu nombre" class="w-full px-4 py-3 bg-surface-50 border border-surface-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-furent-500/30 focus:border-furent-500 input-glow transition-all">
                                </div>
                                <div>
                                    <label class="block text-xs font-medium text-surface-600 uppercase tracking-wider mb-2">Email</label>
                                    <input type="email" name="email" required placeholder="tu@email.com" class="w-full px-4 py-3 bg-surface-50 border border-surface-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-furent-500/30 focus:border-furent-500 input-glow transition-all">
                                </div>
                            </div>
                            <div>
                                <label class="block text-xs font-medium text-surface-600 uppercase tracking-wider mb-2">Teléfono</label>
                                <input type="tel" name="telefono" placeholder="+57 300 000 0000" class="w-full px-4 py-3 bg-surface-50 border border-surface-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-furent-500/30 focus:border-furent-500 input-glow transition-all">
                            </div>
                            <div>
                                <label class="block text-xs font-medium text-surface-600 uppercase tracking-wider mb-2">Asunto</label>
                                <select name="asunto" required class="w-full px-4 py-3 bg-surface-50 border border-surface-200 rounded-xl text-sm text-surface-600 focus:outline-none focus:ring-2 focus:ring-furent-500/30 focus:border-furent-500 input-glow transition-all">
                                    <option value="">Seleccionar tipo de evento</option>
                                    <option value="Boda">Boda</option>
                                    <option value="Evento corporativo">Evento corporativo</option>
                                    <option value="Fiesta privada">Fiesta privada</option>
                                    <option value="Gala">Gala</option>
                                    <option value="Conferencia">Conferencia</option>
                                    <option value="Consulta general">Consulta general</option>
                                    <option value="Otro">Otro</option>
                                </select>
                            </div>
                            <div>
                                <label class="block text-xs font-medium text-surface-600 uppercase tracking-wider mb-2">Mensaje</label>
                                <textarea name="mensaje" rows="4" required placeholder="Cuéntanos sobre tu evento..." class="w-full px-4 py-3 bg-surface-50 border border-surface-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-furent-500/30 focus:border-furent-500 input-glow transition-all resize-none"></textarea>
                            </div>
                            <button type="submit" class="w-full sm:w-auto inline-flex items-center justify-center gap-2 px-8 py-3.5 bg-surface-900 text-white font-semibold rounded-xl hover:bg-surface-800 transition-colors">
                                Enviar mensaje
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M6 12L3.269 3.126A59.768 59.768 0 0121.485 12 59.77 59.77 0 013.27 20.876L5.999 12zm0 0h7.5"/></svg>
                            </button>
                        </form>
                    </div>
                </div>

                <!-- Contact info -->
                <div class="lg:col-span-2 space-y-6 fade-in-up stagger-2">
                    <div class="bg-white rounded-2xl p-6 shadow-soft border border-surface-100">
                        <div class="flex items-start gap-4">
                            <div class="w-10 h-10 bg-furent-50 rounded-xl flex items-center justify-center shrink-0 border border-furent-100">
                                <svg class="w-5 h-5 text-furent-500" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15 10.5a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" d="M19.5 10.5c0 7.142-7.5 11.25-7.5 11.25S4.5 17.642 4.5 10.5a7.5 7.5 0 1115 0z"/></svg>
                            </div>
                            <div>
                                <h3 class="text-sm font-semibold text-surface-900 mb-1">Dirección</h3>
                                <p class="text-sm text-surface-500">Calle 85 #15-40, Bogotá, Colombia</p>
                            </div>
                        </div>
                    </div>
                    <div class="bg-white rounded-2xl p-6 shadow-soft border border-surface-100">
                        <div class="flex items-start gap-4">
                            <div class="w-10 h-10 bg-furent-50 rounded-xl flex items-center justify-center shrink-0 border border-furent-100">
                                <svg class="w-5 h-5 text-furent-500" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M2.25 6.75c0 8.284 6.716 15 15 15h2.25a2.25 2.25 0 002.25-2.25v-1.372c0-.516-.351-.966-.852-1.091l-4.423-1.106c-.44-.11-.902.055-1.173.417l-.97 1.293c-.282.376-.769.542-1.21.38a12.035 12.035 0 01-7.143-7.143c-.162-.441.004-.928.38-1.21l1.293-.97c.363-.271.527-.734.417-1.173L6.963 3.102a1.125 1.125 0 00-1.091-.852H4.5A2.25 2.25 0 002.25 4.5v2.25z"/></svg>
                            </div>
                            <div>
                                <h3 class="text-sm font-semibold text-surface-900 mb-1">Teléfono</h3>
                                <p class="text-sm text-surface-500">+57 (1) 555-0123</p>
                                <p class="text-xs text-surface-400 mt-0.5">Lun-Vie 8:00-18:00</p>
                            </div>
                        </div>
                    </div>
                    <div class="bg-white rounded-2xl p-6 shadow-soft border border-surface-100">
                        <div class="flex items-start gap-4">
                            <div class="w-10 h-10 bg-furent-50 rounded-xl flex items-center justify-center shrink-0 border border-furent-100">
                                <svg class="w-5 h-5 text-furent-500" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M21.75 6.75v10.5a2.25 2.25 0 01-2.25 2.25h-15a2.25 2.25 0 01-2.25-2.25V6.75m19.5 0A2.25 2.25 0 0019.5 4.5h-15a2.25 2.25 0 00-2.25 2.25m19.5 0v.243a2.25 2.25 0 01-1.07 1.916l-7.5 4.615a2.25 2.25 0 01-2.36 0L3.32 8.91a2.25 2.25 0 01-1.07-1.916V6.75"/></svg>
                            </div>
                            <div>
                                <h3 class="text-sm font-semibold text-surface-900 mb-1">Email</h3>
                                <p class="text-sm text-surface-500">info@furent.co</p>
                            </div>
                        </div>
                    </div>
                    <div class="bg-white rounded-2xl p-6 shadow-soft border border-surface-100">
                        <div class="flex items-start gap-4">
                            <div class="w-10 h-10 bg-green-50 rounded-xl flex items-center justify-center shrink-0 border border-green-100">
                                <svg class="w-5 h-5 text-green-600" fill="currentColor" viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
                            </div>
                            <div>
                                <h3 class="text-sm font-semibold text-surface-900 mb-1">WhatsApp</h3>
                                <p class="text-sm text-surface-500">+57 300 555 0123</p>
                                <p class="text-xs text-surface-400 mt-0.5">Respuesta rápida</p>
                            </div>
                        </div>
                    </div>

                    <!-- Map placeholder -->
                    <div class="bg-white rounded-2xl overflow-hidden shadow-soft border border-surface-100">
                        <div class="bg-surface-100 h-48 flex items-center justify-center">
                            <div class="text-center">
                                <svg class="w-8 h-8 text-surface-300 mx-auto mb-2" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 6.75V15m6-6v8.25m.503 3.498l4.875-2.437c.381-.19.622-.58.622-1.006V4.82c0-.836-.88-1.38-1.628-1.006l-3.869 1.934c-.317.159-.69.159-1.006 0L9.503 3.252a1.125 1.125 0 00-1.006 0L3.622 5.689C3.24 5.88 3 6.27 3 6.695V19.18c0 .836.88 1.38 1.628 1.006l3.869-1.934c.317-.159.69-.159 1.006 0l4.994 2.497c.317.158.69.158 1.006 0z"/></svg>
                                <p class="text-sm text-surface-400">Mapa</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

    </main>

    <div th:replace="~{fragments/layout :: footer}"></div>
    <script th:src="@{/js/app.js}"></script>
</body>
</html>
