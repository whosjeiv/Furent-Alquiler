        tailwind.config = {
            darkMode: 'class',

                    fontFamily: { sans: ['Outfit', 'sans-serif'] },

    <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/es.js"></script>
    <script th:src="@{/js/app.js}"></script>
    <!-- Alpine JS plugins -->
    <script defer src="https://cdn.jsdelivr.net/npm/@alpinejs/collapse@3.x.x/dist/cdn.min.js"></script>

    <!-- Tailwind Plus Elements for Modals -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindplus/elements@1" type="module"></script>
    <!-- Theme detection (sync with public site localStorage) -->
    <script>
        (function() {
            if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                document.documentElement.classList.add('dark');
            } else {
                document.documentElement.classList.remove('dark');
            }
        })();

        // Global UI Notification System
        window.showToast = function(optionsOrMessage, typeOverride = 'success', durationOverride = 5000) {
            const container = document.getElementById('toast-container');
            if (!container) {
                console.warn('Toast container not found');
                return;
            }
            let config = { message: '', title: '', type: typeOverride, duration: durationOverride };
            if (typeof optionsOrMessage === 'object' && optionsOrMessage !== null) {
                config = { ...config, ...optionsOrMessage };
            } else {
                config.message = optionsOrMessage;
            }
            const message = String(config.message || '');
            const title = String(config.title || '');
            const type = config.type || 'success';
            const duration = config.duration || 5000;
            const id = 'toast-' + Math.random().toString(36).substr(2, 9);
            let iconBoxClass = 'text-green-600 bg-green-50';
            let iconSvg = `<svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/></svg>`;
            if (type === 'error' || type === 'danger') {
                iconBoxClass = 'text-red-600 bg-red-50';
                iconSvg = `<svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>`;
            } else if (type === 'warning') {
                iconBoxClass = 'text-amber-600 bg-amber-50';
                iconSvg = `<svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/></svg>`;
            }
            const toastHtml = `
                <div id="${id}" class="pointer-events-auto flex items-center w-full max-w-sm p-4 text-surface-600 bg-white/95 dark:bg-surface-800/95 backdrop-blur-md rounded-xl shadow-2xl border border-surface-200 dark:border-surface-700 transition-all duration-300" role="alert">
                    <div class="inline-flex items-center justify-center shrink-0 w-8 h-8 ${iconBoxClass} rounded-lg">${iconSvg}</div>
                    <div class="ms-3 text-sm font-bold text-surface-900 dark:text-white">${title ? `<span class="opacity-50 font-medium block text-[10px] uppercase mb-0.5">${title}</span>` : ''}${message}</div>
                    <button type="button" onclick="closeToast('${id}')" class="ms-auto -mx-1.5 -my-1.5 text-surface-400 hover:text-surface-900 dark:hover:text-white rounded-lg p-1.5 hover:bg-surface-100 inline-flex items-center justify-center"><svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg></button>
                </div>
            `;
            container.insertAdjacentHTML('afterbegin', toastHtml);
            setTimeout(() => closeToast(id), duration);
        };
        window.closeToast = function(id) {
            const toast = document.getElementById(id);
            if (toast) { toast.style.opacity = '0'; toast.style.transform = 'translateX(20px)'; setTimeout(() => toast.remove(), 300); }
        };
        window.showModal = function(config) {
            const dialog = document.getElementById('global-dialog');
            const panel = dialog.querySelector('el-dialog-panel');
            const titleEl = document.getElementById('modal-title');
            const msgContainer = document.getElementById('modal-msg-container');
            const messageEl = document.getElementById('modal-message');
            const htmlEl = document.getElementById('modal-html');
            const iconBox = document.getElementById('modal-icon-box');
            const iconSvg = document.getElementById('modal-icon-svg');
            const confirmBtn = document.getElementById('modal-confirm-btn');
            const cancelBtn = document.getElementById('modal-cancel-btn');
            
            if (!dialog || !titleEl) return;
            titleEl.textContent = config.title || 'Aviso';
            confirmBtn.textContent = config.confirmText || 'Entendido';
            
            // Re-apply animation class to ensure it plays
            dialog.classList.remove('animate-modal-out');
            dialog.classList.add('open:animate-modal-in');
            
            // Handle HTML or Text
            if (config.html) {
                htmlEl.innerHTML = config.html;
                htmlEl.classList.remove('hidden');
                msgContainer.classList.add('hidden');
                iconBox.classList.add('hidden');
                panel.classList.remove('sm:max-w-md');
                panel.classList.add('sm:max-w-xl');
            } else {
                messageEl.textContent = config.message || '';
                htmlEl.classList.add('hidden');
                msgContainer.classList.remove('hidden');
                iconBox.classList.remove('hidden');
                panel.classList.remove('sm:max-w-2xl');
                panel.classList.add('sm:max-w-md');
            }

            if (config.cancelText) {
                cancelBtn.textContent = config.cancelText;
                cancelBtn.classList.remove('hidden');
                confirmBtn.classList.replace('flex-1', 'w-full');
            } else {
                cancelBtn.classList.add('hidden');
                confirmBtn.classList.replace('w-full', 'flex-1');
            }

            if (config.type === 'error' || config.type === 'danger') {
                iconBox.className = "mx-auto flex size-20 items-center justify-center rounded-full bg-red-50 border-4 border-white shadow-lg mb-6";
                iconSvg.innerHTML = '<path d="M6 18L18 6M6 6l12 12" />';
                confirmBtn.className = "flex-1 inline-flex justify-center rounded-2xl bg-red-600 px-6 py-4 text-sm font-black text-white shadow-xl shadow-red-600/30 hover:bg-red-700 transition-all";
            } else if (config.type === 'warning') {
                iconBox.className = "mx-auto flex size-20 items-center justify-center rounded-full bg-amber-50 border-4 border-white shadow-lg mb-6";
                iconSvg.innerHTML = '<path d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />';
                confirmBtn.className = "flex-1 inline-flex justify-center rounded-2xl bg-amber-500 px-6 py-4 text-sm font-black text-white shadow-xl shadow-amber-500/30 hover:bg-amber-600 transition-all";
            } else if (config.type === 'info') {
                iconBox.className = "mx-auto flex size-20 items-center justify-center rounded-full bg-blue-50 border-4 border-white shadow-lg mb-6";
                iconSvg.innerHTML = '<path d="M11.25 11.25l.041-.02a.75.75 0 011.063.852l-.708 2.836a.75.75 0 001.063.853l.041-.021M21 12a9 9 0 11-18 0 9 9 0 0118 0zm-9-3.75h.008v.008H12V8.25z" />';
                confirmBtn.className = "flex-1 inline-flex justify-center rounded-2xl bg-blue-500 px-6 py-4 text-sm font-black text-white shadow-xl shadow-blue-500/30 hover:bg-blue-600 transition-all";
            } else {
                iconBox.className = "mx-auto flex size-20 items-center justify-center rounded-full bg-furent-50 border-4 border-white shadow-lg mb-6";
                iconSvg.innerHTML = '<path d="M9 12.75L11.25 15 15 9.75M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />';
                confirmBtn.className = "flex-1 inline-flex justify-center rounded-2xl bg-furent-500 px-6 py-4 text-sm font-black text-white shadow-xl shadow-furent-500/30 hover:bg-furent-600 transition-all";
            }
            dialog.showModal();
            confirmBtn.onclick = () => { closeGlobalModal(config.onConfirm); };
            cancelBtn.onclick = () => { closeGlobalModal(config.onCancel); };
        };

        window.closeGlobalModal = function(callback) {
            const dialog = document.getElementById('global-dialog');
            if (!dialog) return;
            dialog.classList.remove('open:animate-modal-in');
            dialog.classList.add('animate-modal-out');
            setTimeout(() => {
                dialog.close();
                dialog.classList.remove('animate-modal-out');
                if (callback) callback();
            }, 200);
        }
    </script>
