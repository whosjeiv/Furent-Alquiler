    <!-- Theme detection (sync with public site localStorage) -->
    <script>
        (function() {
            if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                document.documentElement.classList.add('dark');
            } else {
                document.documentElement.classList.remove('dark');
            }
        })();
        function toggleAdminTheme() {
            if (document.documentElement.classList.contains('dark')) {
                document.documentElement.classList.remove('dark');
                localStorage.setItem('theme', 'light');
            } else {
                document.documentElement.classList.add('dark');
                localStorage.setItem('theme', 'dark');
            }
            updateThemeIcon();
        }
        function updateThemeIcon() {
            var sunIcon = document.getElementById('admin-sun-icon');
            var moonIcon = document.getElementById('admin-moon-icon');
            if (sunIcon && moonIcon) {
                if (document.documentElement.classList.contains('dark')) {
                    sunIcon.style.display = 'block';
                    moonIcon.style.display = 'none';
                } else {
                    sunIcon.style.display = 'none';
                    moonIcon.style.display = 'block';
                }
            }
        }
        document.addEventListener('DOMContentLoaded', updateThemeIcon);
    </script>

                    <svg class="w-5 h-5 opacity-80 group-hover:opacity-100" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M21.75 6.75v10.5a2.25 2.25 0 01-2.25 2.25h-15a2.25 2.25 0 01-2.25-2.25V6.75m19.5 0A2.25 2.25 0 0019.5 4.5h-15a2.25 2.25 0 00-2.25 2.25m19.5 0v.243a2.25 2.25 0 01-1.07 1.916l-7.5 4.615a2.25 2.25 0 01-2.36 0L3.32 8.91a2.25 2.25 0 01-1.07-1.916V6.75"/></svg>
                    Mensajes
                </div>
                <span class="w-5 h-5 rounded-full bg-blue-500 text-white flex items-center justify-center text-[10px] font-bold shadow-sm" th:if="${mensajesNoLeidos != null and mensajesNoLeidos > 0}" th:text="${mensajesNoLeidos}">0</span>
            </a>
            <a th:href="@{/admin/cupones}" class="nav-link flex items-center gap-3 mx-4 px-4 py-3 rounded-xl transition-all duration-300 group" th:classappend="${activeMenu == 'cupones' ? 'active' : ''}">
                <svg class="w-5 h-5 opacity-80 group-hover:opacity-100" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9.568 3H5.25A2.25 2.25 0 003 5.25v4.318c0 .597.237 1.17.659 1.591l9.581 9.581c.699.699 1.78.872 2.607.33a18.095 18.095 0 005.223-5.223c.542-.827.369-1.908-.33-2.607L11.16 3.66A2.25 2.25 0 009.568 3z"/><path stroke-linecap="round" stroke-linejoin="round" d="M6 6h.008v.008H6V6z"/></svg>
                Cupones
            </a>
        </nav>

        <div class="p-6">
            <div class="p-4 rounded-2xl bg-surface-900 border border-surface-800">
                <div class="flex items-center gap-3 mb-4">
                    <img th:src="@{https://ui-avatars.com/api/(name=${currentUser != null and currentUser.nombre != null ? currentUser.nombre : 'A'},background='E07A3A',color='fff')}" class="w-10 h-10 rounded-full object-cover border-2 border-surface-800">
                    <div class="min-w-0">
                        <p class="text-sm font-semibold text-white truncate" th:text="${currentUser != null ? currentUser.nombre : 'Admin'}">Admin</p>
                        <p class="text-[10px] text-surface-400 truncate" th:text="${currentUser != null ? currentUser.email : 'admin@furent.com'}">admin@furent.com</p>
                    </div>
                </div>
                <div class="flex gap-2">
                    <a th:href="@{/}" class="flex-1 text-center py-2 bg-surface-800 hover:bg-surface-700 text-white text-xs font-semibold rounded-lg transition-colors">Ver sitio</a>
                    <button onclick="toggleAdminTheme()" class="w-9 h-9 flex items-center justify-center bg-surface-800 hover:bg-surface-700 rounded-lg transition-colors shrink-0" title="Cambiar tema">
                        <svg id="admin-moon-icon" class="w-4 h-4 text-surface-400" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M21.752 15.002A9.718 9.718 0 0118 15.75c-5.385 0-9.75-4.365-9.75-9.75 0-1.33.266-2.597.748-3.752A9.753 9.753 0 003 11.25C3 16.635 7.365 21 12.75 21a9.753 9.753 0 009.002-5.998z"/></svg>
                        <svg id="admin-sun-icon" class="w-4 h-4 text-amber-400" style="display:none;" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 3v2.25m6.364.386l-1.591 1.591M21 12h-2.25m-.386 6.364l-1.591-1.591M12 18.75V21m-4.773-4.227l-1.591 1.591M5.25 12H3m4.227-4.773L5.636 5.636M15.75 12a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0z"/></svg>
                    </button>
                    <form th:action="@{/logout}" method="post" class="flex-1 m-0">
                        <button type="submit" class="w-full text-center py-2 bg-red-500/10 text-red-400 hover:bg-red-500/20 text-xs font-semibold rounded-lg transition-colors">Salir</button>
                    </form>
                </div>
            </div>
        </div>
    </aside>

    <!-- Main Content Area -->
    <main class="flex-1 ml-[280px] min-h-screen pb-12 bg-[#fafafa] dark:bg-[#0f0f11]">
        <!-- Content gets injected here -->
        <div th:replace="${content}"></div>
    </main>

    <!-- Global Layout Flashes (SweetAlert) -->
    <script th:inline="javascript">
        $(document).ready(function() {
            var isDark = document.documentElement.classList.contains('dark');
            var successMsg = /*[[${success}]]*/ null;
            if (successMsg) {
                Swal.fire({
                    toast: true,
                    position: 'top-end',
                    icon: 'success',
                    title: successMsg,
                    showConfirmButton: false,
                    timer: 3000,
                    timerProgressBar: true,
                    background: isDark ? '#18181b' : '#fff',
                    color: isDark ? '#f4f4f5' : '#18181b',
                    iconColor: '#22c55e',
                    customClass: { popup: 'rounded-xl border border-surface-200 shadow-sm' }
                });
            }
            
            var errorMsg = /*[[${error}]]*/ null;
            if (errorMsg) {
                Swal.fire({
                    toast: true,
                    position: 'top-end',
                    icon: 'error',
                    title: errorMsg,
                    showConfirmButton: false,
                    timer: 4000,
                    timerProgressBar: true,
                    background: isDark ? '#18181b' : '#fff',
                    color: isDark ? '#f4f4f5' : '#18181b',
                    customClass: { popup: 'rounded-xl border border-surface-200 shadow-sm' }
                });
            }
        });
    </script>
</body>
</html>
