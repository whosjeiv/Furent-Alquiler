<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head th:replace="~{fragments/layout :: head}"></head>
<body class="bg-surface-50 font-sans text-surface-800 min-h-screen flex flex-col">

    <div th:replace="~{fragments/layout :: nav}"></div>

    <main class="flex-1 pt-[68px]">
        <div class="min-h-[calc(100vh-68px)] flex items-center justify-center px-4 py-12">
            <div class="w-full max-w-md fade-in-up">
                <div class="bg-white rounded-2xl p-8 shadow-card border border-surface-100 text-center">
                    <!-- Icon -->
                    <div class="w-16 h-16 rounded-full bg-red-50 flex items-center justify-center mx-auto mb-4">
                        <svg class="w-8 h-8 text-red-500" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m-9.303 3.376c-.866 1.5.217 3.374 1.948 3.374h14.71c1.73 0 2.813-1.874 1.948-3.374L13.949 3.378c-.866-1.5-3.032-1.5-3.898 0L2.697 16.126ZM12 15.75h.007v.008H12v-.008z"/>
                        </svg>
                    </div>

                    <!-- Header -->
                    <h1 class="text-2xl font-bold text-surface-900 mb-2">Enlace inválido</h1>
                    <p class="text-sm text-surface-600 mb-6" th:text="${error ?: 'El enlace ha expirado o ya fue utilizado'}"></p>

                    <!-- Actions -->
                    <div class="space-y-3">
                        <a th:href="@{/password-reset}" class="block w-full py-3 bg-surface-900 text-white font-semibold rounded-xl hover:bg-surface-800 transition-colors">
                            Solicitar nuevo enlace
                        </a>
                        <a th:href="@{/login}" class="block w-full py-3 bg-surface-100 text-surface-700 font-semibold rounded-xl hover:bg-surface-200 transition-colors">
                            Volver al inicio de sesión
                        </a>
                    </div>

                    <!-- Info -->
                    <div class="mt-6 p-4 bg-blue-50 border border-blue-200 rounded-xl text-left">
                        <p class="text-xs text-blue-800 font-medium mb-1">💡 Información</p>
                        <p class="text-xs text-blue-700">Los enlaces de recuperación expiran después de 1 hora por seguridad. Si necesitas restablecer tu contraseña, solicita un nuevo enlace.</p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script th:src="@{/js/app.js}"></script>
</body>
</html>
