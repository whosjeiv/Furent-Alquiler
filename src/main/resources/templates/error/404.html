<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Página no encontrada | Furent</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="bg-gradient-to-br from-orange-50 to-amber-50 min-h-screen flex items-center justify-center font-[Inter]">
    <div class="text-center px-6 py-12">
        <div class="text-9xl font-bold text-orange-400 mb-4 animate-bounce">404</div>
        <h1 class="text-3xl font-bold text-gray-800 mb-4">¡Oops! Página no encontrada</h1>
        <p class="text-gray-600 mb-2" th:text="${error != null ? error : 'La página que buscas no existe o fue movida.'}"></p>
        <p class="text-gray-500 mb-8">No te preocupes, te ayudamos a encontrar lo que necesitas.</p>
        <div class="flex flex-col sm:flex-row gap-4 justify-center">
            <a href="/" class="px-8 py-3 bg-orange-500 text-white rounded-xl font-semibold hover:bg-orange-600 transition-all shadow-lg hover:shadow-xl">
                ← Volver al Inicio
            </a>
            <a href="/catalogo" class="px-8 py-3 bg-white text-orange-500 border-2 border-orange-500 rounded-xl font-semibold hover:bg-orange-50 transition-all">
                Ver Catálogo
            </a>
        </div>
        <div class="mt-12 text-gray-400">
            <svg class="w-24 h-24 mx-auto opacity-30" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1" d="M9.172 16.172a4 4 0 015.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
            </svg>
        </div>
    </div>
</body>
</html>
