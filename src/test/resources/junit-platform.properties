# jqwik Property-Based Testing Configuration
# ============================================
# Configuración para jqwik usando junit-platform.properties (requerido desde jqwik 1.6+)

# Número de iteraciones por property test (mínimo 100 según requisitos)
jqwik.tries.default = 100

# Configuración de shrinking (reducción de casos de prueba fallidos)
# Bounded a 1000 iteraciones máximas para evitar tiempos excesivos
jqwik.shrinking.bounded.seconds = 10
jqwik.shrinking.bounded.tries = 1000

# Configuración de generación de datos
jqwik.generation.mode = AUTO

# Configuración de reporting
jqwik.reporting.usejunitplatform = true

# Configuración de edge cases (casos extremos)
jqwik.edgecases.mode = MIXIN

# Configuración de seeds para reproducibilidad
jqwik.seeds.whenfixed = ALLOW
