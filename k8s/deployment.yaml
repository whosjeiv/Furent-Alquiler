apiVersion: apps/v1
kind: Deployment
metadata:
  name: furent-app
  namespace: furent
  labels:
    app: furent
    component: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: furent
      component: backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: furent
        component: backend
    spec:
      containers:
        - name: furent
          image: furent/backend:latest
          ports:
            - containerPort: 8080
              protocol: TCP
          envFrom:
            - configMapRef:
                name: furent-config
            - secretRef:
                name: furent-secrets
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "1000m"
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 3
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 15
            timeoutSeconds: 3
          volumeMounts:
            - name: uploads
              mountPath: /app/uploads
      volumes:
        - name: uploads
          persistentVolumeClaim:
            claimName: furent-uploads-pvc
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: furent-uploads-pvc
  namespace: furent
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
