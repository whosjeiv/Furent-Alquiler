    <script>
        // Check theme on load
        var serverTheme = null;
        if (serverTheme === 'dark') {
            document.documentElement.classList.add('dark');
            localStorage.setItem('theme', 'dark');
        } else if (serverTheme === 'light') {
            document.documentElement.classList.remove('dark');
            localStorage.setItem('theme', 'light');
        } else {
            if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                document.documentElement.classList.add('dark');
            } else {
                document.documentElement.classList.remove('dark');
            }
        }

        function toggleTheme() {
            if (document.documentElement.classList.contains('dark')) {
                document.documentElement.classList.remove('dark');
                localStorage.setItem('theme', 'light');
            } else {
                document.documentElement.classList.add('dark');
                localStorage.setItem('theme', 'dark');
            }
        }
        document.addEventListener('DOMContentLoaded', () => { AOS.init({ duration: 800, once: true }); });
    </script>

    <script>
    document.addEventListener('DOMContentLoaded', () => {
        const params = new URLSearchParams(window.location.search);
        
        // --- Suspensión SweetAlert ---
        if (params.has('suspended')) {
            const reason = params.get('reason') || 'No especificado';
            const duration = params.get('duration') || 'Indefinida';
            
            Swal.fire({
                title: '<span class="text-red-600 font-extrabold text-2xl">Acceso Restringido</span>',
                html: `
                    <div class="mt-4 space-y-4 text-left px-2">
                        <div class="p-4 bg-red-50 rounded-2xl border border-red-100">
                            <p class="text-[11px] font-bold text-red-400 uppercase tracking-widest mb-1">Motivo detectado</p>
                            <p class="text-sm font-bold text-red-900 leading-relaxed">${reason}</p>
                        </div>
                        
                        <div class="p-4 bg-surface-50 rounded-2xl border border-surface-100">
                            <p class="text-[11px] font-bold text-surface-400 uppercase tracking-widest mb-1">Periodo de Sanción</p>
                            <p class="text-sm font-bold text-surface-900">${duration}</p>
                        </div>

                        <p class="text-xs text-surface-500 text-center px-4 leading-relaxed">Si consideras que esto es un error, puedes iniciar un proceso de apelación con nuestro equipo de soporte.</p>
                    </div>
                `,
                icon: 'error',
                confirmButtonText: '<div class="flex items-center gap-2"><span>Apelar Decisión</span><svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M13.5 6H5.25A2.25 2.25 0 003 8.25v10.5A2.25 2.25 0 005.25 21h10.5A2.25 2.25 0 0018 18.75V10.5m-10.5 6L21 3m0 0h-5.25M21 3v5.25"/></svg></div>',
                cancelButtonText: 'Entendido',
                showCancelButton: true,
                confirmButtonColor: '#18181b',
                cancelButtonColor: '#94a3b8',
                showClass: { popup: 'animate__animated animate__zoomIn animate__faster' },
                hideClass: { popup: 'animate__animated animate__zoomOut animate__faster' },
                customClass: {
                    popup: 'rounded-[3rem] p-8 shadow-2xl border border-surface-100',
                    confirmButton: 'rounded-2xl text-sm font-bold px-6 py-3.5 order-2',
                    cancelButton: 'rounded-2xl text-sm font-bold px-6 py-3.5 order-1'
                }
            }).then((result) => {
                if (result.isConfirmed) {
                    window.location.href = "mailto:soporte@furent.com?subject=Apelación de Suspensión - " + encodeURIComponent(params.get('email') || '');
                }
            });
        }

        if (!params.has('manual') && !params.has('error') && !params.has('logout') && !params.has('suspended')) {
            try {
                const accounts = JSON.parse(localStorage.getItem('furent_accounts') || '[]');
                if (accounts.length > 0) {
                    window.location.href = '/inicio-rapido';
                }
            } catch(e) {}
        }
    });

    function togglePass(inputId, btn) {
        const input = document.getElementById(inputId);
        const isPassword = input.type === 'password';
        input.type = isPassword ? 'text' : 'password';
        btn.querySelector('.eye-open').classList.toggle('hidden', !isPassword);
        btn.querySelector('.eye-closed').classList.toggle('hidden', isPassword);
    }
    </script>
</body>
</html>
