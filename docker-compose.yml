# ═══════════════════════════════════════════════════════
# FURENT - Docker Compose Stack Completo
# ═══════════════════════════════════════════════════════
# Servicios: Backend + MongoDB + Redis + Prometheus + Grafana
# Arquitectura: SaaS Enterprise con observabilidad completa
# ═══════════════════════════════════════════════════════

services:
  # ─── Backend Spring Boot ────────────────────────────
  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATA_MONGODB_URI=mongodb://mongo:27017/furent
      - SPRING_PROFILES_ACTIVE=prod
      - FURENT_ADMIN_PASSWORD=${FURENT_ADMIN_PASSWORD:-admin123}
      - JWT_SECRET=${JWT_SECRET:-dGhpcyBpcyBhIHNlY3VyZSBrZXkgZm9yIGZ1cmVudCBzYWFzIHBsYXRmb3JtIDIwMjY=}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - uploads:/app/uploads
      - app-logs:/app/logs
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
    networks:
      - furent-network

  # ─── MongoDB 7 ──────────────────────────────────────
  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh --quiet
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped
    networks:
      - furent-network

  # ─── Redis 7 (Cache) ───────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - furent-network

  # ─── Prometheus (Métricas) ──────────────────────────
  prometheus:
    image: prom/prometheus:v2.51.0
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=15d'
      - '--web.enable-lifecycle'
    depends_on:
      - app
    restart: unless-stopped
    networks:
      - furent-network

  # ─── Grafana (Dashboards) ──────────────────────────
  grafana:
    image: grafana/grafana:10.4.0
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-furent2026}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    restart: unless-stopped
    networks:
      - furent-network

volumes:
  mongo-data:
  uploads:
  redis-data:
  prometheus-data:
  grafana-data:
  app-logs:

networks:
  furent-network:
    driver: bridge
